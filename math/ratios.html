<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Ratio Rally</title>
<style>
  :root {
    --panel:#fff; --ink:#1e293b; --muted:#64748b;
    --accent:#0d9488; --accent-soft:#ccfbf1; --correct:#16a34a; --wrong:#dc2626;
    --line:#94a3b8; --shadow:0 10px 30px rgba(13,148,136,.16);
    --a:#0d9488; --b:#f59e0b;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; color:var(--ink); background:linear-gradient(160deg,#f0fdfa,#f8fafc); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:24px 16px 60px; }
  h1 { font-size:26px; margin:6px 0 2px; letter-spacing:-.5px; }
  .sub { color:var(--muted); margin:0 0 18px; font-size:15px; text-align:center; max-width:520px; line-height:1.5; }
  .nav{ display:flex; gap:8px; background:#fff; padding:5px; border-radius:12px; box-shadow:var(--shadow); margin-bottom:14px; flex-wrap:wrap; justify-content:center; max-width:680px; }
  .nav a{ text-decoration:none; font-weight:800; font-size:13.5px; color:var(--muted); padding:8px 13px; border-radius:9px; }
  .nav a.on{ background:var(--accent); color:#fff; }

  .controls { display:flex; flex-direction:column; align-items:center; gap:12px; margin-bottom:16px; }
  .seg { display:flex; background:var(--panel); border-radius:14px; padding:5px; box-shadow:var(--shadow); gap:4px; flex-wrap:wrap; justify-content:center; }
  .seg button { border:none; background:transparent; font-family:inherit; font-weight:800; font-size:14.5px; padding:9px 16px; border-radius:10px; cursor:pointer; color:var(--muted); }
  .seg button.on { background:var(--accent); color:#fff; }
  .levels { display:flex; gap:8px; align-items:center; }
  .levels .lbl { font-size:13px; color:var(--muted); font-weight:700; margin-right:2px; }
  .lvl { width:38px; height:38px; border:none; border-radius:11px; font-weight:800; font-size:15px; cursor:pointer; background:var(--panel); color:var(--muted); box-shadow:var(--shadow); }
  .lvl.on { background:var(--accent); color:#fff; }

  .scorebar { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; justify-content:center; }
  .chip { background:var(--panel); border-radius:999px; padding:8px 16px; font-weight:700; font-size:14px; box-shadow:var(--shadow); display:flex; align-items:center; gap:6px; }
  .chip small { color:var(--muted); font-weight:600; }
  .chip.streak { color:#ea580c; }

  .layout { display:flex; gap:24px; width:100%; max-width:1000px; align-items:flex-start; flex-wrap:wrap; justify-content:center; }
  .card { background:var(--panel); border-radius:24px; box-shadow:var(--shadow); padding:28px; }
  .quiz { flex:1 1 360px; display:flex; flex-direction:column; align-items:center; min-height:420px; }
  .visual { flex:1 1 360px; display:flex; flex-direction:column; align-items:center; }

  .prompt { color:var(--muted); font-size:14px; margin:0 0 16px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; text-align:center; }
  .bigq { font-size:26px; font-weight:800; text-align:center; line-height:1.35; margin:0 auto 6px; max-width:420px; }
  .bigq .hl { color:var(--accent); }

  .choices { display:flex; flex-direction:column; gap:11px; width:100%; max-width:340px; margin-top:14px; }
  .choice { background:#fff; border:3px solid #e2e8f0; border-radius:16px; font-size:19px; font-weight:800; padding:13px 18px; color:var(--ink); cursor:pointer; text-align:center; font-family:inherit; }
  .choice:hover:not(:disabled) { border-color:var(--accent); background:var(--accent-soft); }
  .choice.correct { border-color:var(--correct); background:#dcfce7; color:var(--correct); }
  .choice.wrong { border-color:var(--wrong); background:#fee2e2; color:var(--wrong); }
  .choice:disabled { cursor:default; }

  .numinput { display:flex; align-items:center; gap:10px; margin:14px 0 2px; justify-content:center; }
  .numinput .pre, .numinput .post { font-size:20px; font-weight:800; color:var(--muted); }
  .numinput input { width:120px; font-size:30px; font-weight:800; text-align:center; border:3px solid #e2e8f0; border-radius:14px; padding:10px 6px; font-family:inherit; color:var(--ink); -moz-appearance:textfield; }
  .numinput input::-webkit-outer-spin-button, .numinput input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
  .numinput input:focus { border-color:var(--accent); outline:none; box-shadow:0 0 0 4px var(--accent-soft); }

  .feedback { min-height:26px; margin-top:16px; font-weight:700; font-size:17px; text-align:center; }
  .feedback.good { color:var(--correct); }
  .feedback.bad { color:var(--wrong); }

  .reveal { color:var(--ink); font-size:14.5px; line-height:1.6; text-align:left; width:100%; max-width:420px; margin:14px auto 4px; padding:13px 16px; background:var(--accent-soft); border-left:3px solid var(--accent); border-radius:8px; }
  .reveal.hidden { display:none; }
  .reveal b { color:#0f766e; }

  button.act { font-family:inherit; font-size:16px; font-weight:700; border:none; border-radius:14px; padding:13px 24px; cursor:pointer; }
  button.act:disabled { opacity:.55; cursor:default; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:#0f766e; }
  .btn-ghost { background:var(--accent-soft); color:var(--accent); }
  .btn-row { display:flex; gap:12px; margin-top:18px; flex-wrap:wrap; justify-content:center; }

  /* Ratio dots */
  .dots { display:flex; flex-direction:column; gap:12px; align-items:flex-start; margin:6px 0; }
  .dotrow { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .dotrow .rl { font-size:13px; font-weight:800; color:var(--muted); width:64px; }
  .dot { width:26px; height:26px; border-radius:50%; box-shadow:inset 0 0 0 2px rgba(255,255,255,.4); }
  .dot.a { background:var(--a); } .dot.b { background:var(--b); }

  /* Ratio table */
  .rtable { border-collapse:collapse; margin:8px auto; }
  .rtable td { border:2px solid #e2e8f0; padding:8px 14px; font-weight:800; font-size:17px; text-align:center; }
  .rtable td.h { background:#f1f5f9; color:var(--muted); font-size:14px; }
  .rtable td.a { color:var(--a); } .rtable td.b { color:var(--b); }
  .rtable td.hi { background:var(--accent-soft); }

  /* percent bar */
  .pbar { width:100%; max-width:340px; height:38px; border:3px solid var(--ink); border-radius:8px; overflow:hidden; display:flex; margin:8px auto; }
  .pbar .fill { background:var(--accent); }
  .pbar .rest { background:#f1f5f9; flex:1; }
  .pcaption { text-align:center; font-size:13px; color:var(--muted); font-weight:700; }

  .learn-panel { display:flex; flex-direction:column; align-items:center; gap:18px; width:100%; }
  .stepper-row { display:flex; align-items:center; gap:20px; flex-wrap:wrap; justify-content:center; }
  .stepper { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .stepper .lbl { font-size:12.5px; font-weight:800; text-transform:uppercase; letter-spacing:.4px; }
  .stepper .row { display:flex; align-items:center; gap:10px; }
  .stepbtn { width:38px; height:38px; border:none; border-radius:11px; background:var(--accent-soft); color:var(--accent); font-size:20px; font-weight:800; cursor:pointer; }
  .stepbtn:hover { background:var(--accent); color:#fff; }
  .stepval { min-width:44px; text-align:center; font-size:26px; font-weight:800; }
  .readout { text-align:center; }
  .readout .eqline { font-size:22px; font-weight:800; margin:8px 0; line-height:1.5; }
  .readout .sentence { color:var(--muted); font-size:14.5px; max-width:340px; margin:0 auto; line-height:1.5; }

  #confetti { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50; }
  .conf { position:absolute; top:-20px; width:11px; height:14px; border-radius:2px; opacity:.95; animation:fall linear forwards; }
  @keyframes fall { to { transform:translateY(105vh) rotate(720deg); opacity:1; } }
  #streakBanner { position:fixed; left:50%; top:22%; transform:translate(-50%,-50%) scale(.6); background:linear-gradient(135deg,#14b8a6,#0d9488); color:#fff; font-weight:900; font-size:28px; padding:20px 38px; border-radius:22px; box-shadow:0 18px 50px rgba(13,148,136,.45); z-index:60; opacity:0; pointer-events:none; text-align:center; white-space:nowrap; }
  #streakBanner.show { animation: banner 1.9s cubic-bezier(.2,.9,.3,1.3) forwards; }
  #streakBanner small { display:block; font-size:15px; font-weight:700; opacity:.9; margin-top:4px; }
  @keyframes banner { 0%{opacity:0; transform:translate(-50%,-50%) scale(.6)} 15%{opacity:1; transform:translate(-50%,-50%) scale(1.08)} 28%{transform:translate(-50%,-50%) scale(1)} 80%{opacity:1; transform:translate(-50%,-50%) scale(1)} 100%{opacity:0; transform:translate(-50%,-60%) scale(.95)} }
</style>
</head>
<body>
  <div class="nav">
    <a href="../index.html">🏠 Home</a>
    <a href="index.html">📊 Blocks</a>
    <a href="fractions.html">🍰 Fractions</a>
    <a href="decimals.html">🔟 Decimals</a>
    <a href="ratios.html" class="on">➗ Ratios</a>
    <a href="integers.html">➕➖ Integers</a>
    <a href="stats.html">📊 Data</a>
    <a href="angles.html">📐 Angles</a>
    <a href="algebra.html">🧩 Algebra</a>
  </div>
  <h1>➗ Ratio Rally</h1>
  <p class="sub">See ratios as dots and tables, then master equivalent ratios, unit rates, and percents.</p>

  <div class="controls">
    <div class="seg" id="modeSeg">
      <button data-mode="learn" class="on">🔎 Learn</button>
      <button data-mode="equiv">⚖️ Equivalent</button>
      <button data-mode="rate">🏁 Unit Rate</button>
      <button data-mode="percent">💯 Percent</button>
    </div>
    <div class="levels" id="levelSeg" style="display:none">
      <span class="lbl">Level</span>
      <button class="lvl on" data-lvl="1">1</button>
      <button class="lvl" data-lvl="2">2</button>
      <button class="lvl" data-lvl="3">3</button>
    </div>
  </div>

  <div id="confetti"></div>
  <div id="streakBanner"></div>

  <div class="scorebar" id="scorebar" style="display:none">
    <div class="chip">✅ <span id="correctCount">0</span> <small>correct</small></div>
    <div class="chip">🎯 <span id="totalCount">0</span> <small>tried</small></div>
    <div class="chip streak">🔥 <span id="streak">0</span> <small>streak</small></div>
  </div>

  <div class="layout" id="layout"></div>

<script>
(function(){
  const $ = id => document.getElementById(id);
  const rand = (lo,hi) => Math.floor(Math.random()*(hi-lo+1))+lo;
  const pick = arr => arr[Math.floor(Math.random()*arr.length)];
  const gcd = (a,b) => b===0 ? a : gcd(b, a%b);
  const shuffle = arr => arr.slice().sort(()=>Math.random()-0.5);

  let mode='learn', level=1;
  let correct=0, total=0, streak=0;
  let answered=false, advanceReady=true, advanceTimer=null, countdownTimer=null;
  let cur=null, lastKey=null;
  let la=2, lb=3;   // learn ratio

  function clearTimers(){ if(advanceTimer){clearTimeout(advanceTimer);advanceTimer=null;} if(countdownTimer){clearInterval(countdownTimer);countdownTimer=null;} }
  function updateScore(){ $('correctCount').textContent=correct; $('totalCount').textContent=total; $('streak').textContent=streak; }
  function resetProgress(){ correct=0; total=0; streak=0; lastKey=null; updateScore(); }

  // ---------- LEARN ----------
  function dotsHTML(a,b){
    const row=(cls,n,label)=>`<div class="dotrow"><span class="rl">${label}</span>${Array.from({length:n},()=>`<span class="dot ${cls}"></span>`).join('')}</div>`;
    return `<div class="dots">${row('a',a,'part 1')}${row('b',b,'part 2')}</div>`;
  }
  function ratioTable(a,b,cols,hiCol){
    let top='<tr><td class="h">×</td>', ra='<tr><td class="h a">part 1</td>', rb='<tr><td class="h b">part 2</td>';
    for(let k=1;k<=cols;k++){ const hi=k===hiCol?' hi':''; top+=`<td class="h${hi}">${k}</td>`; ra+=`<td class="a${hi}">${a*k}</td>`; rb+=`<td class="b${hi}">${b*k}</td>`; }
    return `<table class="rtable">${top}</tr>${ra}</tr>${rb}</tr></table>`;
  }
  function renderLearn(){
    $('scorebar').style.display='none'; $('levelSeg').style.display='none';
    const g=gcd(la,lb); const sa=la/g, sb=lb/g;
    const pct=Math.round(la/(la+lb)*100);
    $('layout').innerHTML=`
      <div class="card visual" style="flex:1 1 320px"><div class="learn-panel">
        ${dotsHTML(la,lb)}
        <div style="width:100%">${ratioTable(la,lb,4)}</div>
      </div></div>
      <div class="card quiz" style="flex:1 1 320px; min-height:auto"><div class="learn-panel">
        <div class="stepper-row">
          <div class="stepper"><div class="lbl" style="color:var(--a)">Part 1</div><div class="row"><button class="stepbtn" id="aD">−</button><div class="stepval" id="aV">${la}</div><button class="stepbtn" id="aU">+</button></div></div>
          <div class="stepper"><div class="lbl" style="color:var(--b)">Part 2</div><div class="row"><button class="stepbtn" id="bD">−</button><div class="stepval" id="bV">${lb}</div><button class="stepbtn" id="bU">+</button></div></div>
        </div>
        <div class="readout">
          <div class="eqline">The ratio is <span style="color:var(--a)">${la}</span> : <span style="color:var(--b)">${lb}</span></div>
          <p class="sentence">For every <b>${la}</b> of part 1, there are <b>${lb}</b> of part 2. ${g>1?`In simplest form that’s <b>${sa} : ${sb}</b>.`:`That’s already in simplest form.`}<br>The table shows <b>equivalent ratios</b> — multiply BOTH parts by the same number and the ratio stays the same.</p>
        </div>
        <div class="btn-row"><button class="act btn-ghost" id="rnd">🎲 Randomize</button></div>
      </div></div>`;
    $('aD').onclick=()=>{la=Math.max(1,la-1);renderLearn();}; $('aU').onclick=()=>{la=Math.min(9,la+1);renderLearn();};
    $('bD').onclick=()=>{lb=Math.max(1,lb-1);renderLearn();}; $('bU').onclick=()=>{lb=Math.min(9,lb+1);renderLearn();};
    $('rnd').onclick=()=>{la=rand(1,6);lb=rand(1,6);renderLearn();};
  }

  // ---------- shared chrome ----------
  function quizShell(prompt, subjectHTML, visualHTML){
    $('scorebar').style.display='flex'; $('levelSeg').style.display='flex';
    $('layout').innerHTML=`
      <div class="card quiz">
        <p class="prompt">${prompt}</p>
        <div id="subject">${subjectHTML}</div>
        <div class="choices" id="choices"></div>
        <div id="inputWrap"></div>
        <div class="feedback" id="feedback"></div>
        <div class="reveal hidden" id="reveal"></div>
        <div class="btn-row" id="nextRow" style="display:none"><button class="act btn-primary" id="nextBtn">Next ➡️</button></div>
      </div>
      <div class="card visual" id="visualCard">${visualHTML||''}</div>`;
    if(!visualHTML) $('visualCard').style.display='none';
  }
  function startReadLock(){
    advanceReady=false; let secs=3; const nb=$('nextBtn');
    nb.disabled=true; nb.textContent=`Read it… (${secs})`; $('nextRow').style.display='flex';
    countdownTimer=setInterval(()=>{ secs--; if(secs>0)nb.textContent=`Read it… (${secs})`; else{clearInterval(countdownTimer);countdownTimer=null;} },1000);
    advanceTimer=setTimeout(()=>{ advanceReady=true; advanceTimer=null; nb.disabled=false; nb.textContent='Next ➡️'; nb.focus(); },3000);
  }
  function tryAdvance(){ if(answered && advanceReady) newRound(); }
  function celebrate(n){
    const banner=$('streakBanner'); banner.innerHTML=`🌟 ${n} in a row!<small>Ratio champ!</small>`;
    banner.classList.remove('show'); void banner.offsetWidth; banner.classList.add('show');
    const colors=['#0d9488','#14b8a6','#f59e0b','#16a34a','#0ea5e9','#8b5cf6']; const box=$('confetti');
    for(let i=0;i<90;i++){ const c=document.createElement('div'); c.className='conf'; c.style.left=Math.random()*100+'vw'; c.style.background=colors[i%colors.length]; c.style.animationDuration=(1.6+Math.random()*1.4)+'s'; c.style.animationDelay=(Math.random()*0.4)+'s'; box.appendChild(c); setTimeout(()=>c.remove(),3400); }
  }
  function finishAnswer(isCorrect, revealHTML){
    answered=true; total++;
    if(isCorrect){ correct++; streak++; } else streak=0;
    updateScore();
    const fb=$('feedback');
    if(isCorrect){ fb.textContent=pick(['🎉 Correct!','⭐ Nice!','✅ You got it!','🏁 Yes!']); fb.className='feedback good'; }
    else { fb.textContent='Not quite — here’s how to solve it:'; fb.className='feedback bad'; }
    const rev=$('reveal'); rev.innerHTML=revealHTML; rev.className='reveal';
    if(isCorrect && streak>0 && streak%5===0) celebrate(streak);
    startReadLock();
  }
  function buildChoices(opts, correctVal, fmt){
    const box=$('choices'); box.innerHTML='';
    shuffle(opts).forEach(v=>{
      const btn=document.createElement('button'); btn.className='choice'; btn.innerHTML=fmt?fmt(v):v; btn.dataset.v=v;
      if(v===correctVal) btn.dataset.correct='1';
      btn.onclick=()=>{ if(answered)return; [...box.children].forEach(c=>{c.disabled=true; if(c.dataset.correct)c.classList.add('correct');}); if(!btn.dataset.correct)btn.classList.add('wrong'); finishAnswer(!!btn.dataset.correct, box._reveal); };
      box.appendChild(btn);
    });
  }
  function numInput(pre, post, checkFn){
    $('inputWrap').innerHTML=`<div class="numinput">${pre?`<span class="pre">${pre}</span>`:''}<input type="number" id="ans" inputmode="numeric" placeholder="?">${post?`<span class="post">${post}</span>`:''}</div><div class="btn-row"><button class="act btn-primary" id="checkBtn">Check</button></div>`;
    $('checkBtn').onclick=checkFn; setTimeout(()=>$('ans').focus(),10);
  }

  // ---------- EQUIVALENT RATIOS ----------
  function roundEquiv(){
    const maxK={1:4,2:6,3:10}[level];
    let a,b,k,tries=0;
    do { a=rand(1,level===1?4:6); b=rand(1,level===1?4:6); k=rand(2,maxK); tries++; } while(a===b && tries<10);
    lastKey=`${a}:${b}x${k}`;
    const hideSecond=pick([true,false]);
    const q = hideSecond ? `${a} : ${b} = ${a*k} : <span class="hl">?</span>` : `${a} : ${b} = <span class="hl">?</span> : ${b*k}`;
    const ans = hideSecond ? b*k : a*k;
    quizShell('Fill in the missing number to keep the ratio equal.',
      `<div class="bigq">${q}</div>`, ratioTable(a,b,Math.max(k,4),k));
    const opts=new Set([ans]);
    [ans+b, ans-b, ans+a, Math.max(1,ans-a), a*k+b*k, ans*2].forEach(x=>{ if(x>0 && opts.size<4) opts.add(x); });
    let g=0; while(opts.size<4 && g++<40){ const c=ans+rand(-6,6); if(c>0) opts.add(c); }
    $('choices')._reveal = `<b>${a} : ${b}</b> was multiplied by <b>${k}</b> on both sides (×${k}). So ${a}×${k}=${a*k} and ${b}×${k}=${b*k}. The missing number is <b>${ans}</b>. Equivalent ratios always scale BOTH parts by the same amount.`;
    const four = [...opts].slice(0,4);
    if (!four.includes(ans)) four[3] = ans;   // ans is always first in the set, but guard anyway
    buildChoices(four, ans);
  }

  // ---------- UNIT RATE ----------
  function roundRate(){
    const kinds=[
      ()=>{ const per=rand(2,level+8), n=rand(2,5), tot=per*n; return {q:`${tot} miles in ${n} hours`, unit:'miles per hour', ans:per, work:`Divide to find “per 1”: ${tot} ÷ ${n} = <b>${per}</b> miles every hour.`}; },
      ()=>{ const per=rand(2,level+6), n=rand(2,6), tot=per*n; return {q:`$${tot} for ${n} tickets`, unit:'dollars per ticket', ans:per, work:`Divide the total by the number: $${tot} ÷ ${n} = <b>$${per}</b> per ticket.`}; },
      ()=>{ const per=rand(3,level+9), n=rand(2,5), tot=per*n; return {q:`${tot} words in ${n} minutes`, unit:'words per minute', ans:per, work:`${tot} ÷ ${n} = <b>${per}</b> words each minute.`}; },
      ()=>{ const per=rand(2,level+7), n=rand(2,6), tot=per*n; return {q:`${tot} apples in ${n} baskets`, unit:'apples per basket', ans:per, work:`${tot} ÷ ${n} = <b>${per}</b> apples in each basket.`}; }
    ];
    let r,tries=0; do{ r=pick(kinds)(); tries++; }while(r.q===lastKey && tries<10); lastKey=r.q;
    cur=r;
    quizShell('Find the UNIT RATE (the amount for just 1).', `<div class="bigq">${r.q}</div><p class="pcaption">= ? ${r.unit}</p>`);
    numInput('', r.unit, checkRate);
  }
  function checkRate(){
    if(answered) return;
    const v=parseFloat($('ans').value); if(isNaN(v)) return;
    $('ans').disabled=true; $('checkBtn').style.display='none';
    finishAnswer(v===cur.ans, `A <b>unit rate</b> is “how much for 1.” ${cur.work} <br>Answer: <b>${cur.ans} ${cur.unit}</b>.`);
  }

  // ---------- PERCENT ----------
  function pbar(pct){ return `<div class="pbar"><div class="fill" style="width:${pct}%"></div><div class="rest"></div></div><p class="pcaption">${pct}% shaded</p>`; }
  function roundPercent(){
    const nice=[5,10,20,25,40,50,60,75,80,100];
    const kind=pick(['of','whatpct']);
    if(kind==='of'){
      const pct=pick([10,20,25,40,50,60,75,80,100].filter(p=>p<=100));
      const base=pick([20,40,50,60,80,100,120,200].filter(b=>Number.isInteger(b*pct/100)));
      const ans=base*pct/100;
      lastKey=`of${pct}${base}`;
      quizShell('Solve the percent problem.', `<div class="bigq">What is <span class="hl">${pct}%</span> of <span class="hl">${base}</span>?</div>`, pbar(pct));
      numInput('', '', ()=>checkPct(ans, `<b>${pct}%</b> means ${pct} out of 100 = <b>${(pct/100)}</b> (a decimal). Multiply: ${(pct/100)} × ${base} = <b>${ans}</b>. Tip: 10% of ${base} is ${base/10}, so ${pct}% is ${pct/10} of that.`));
    } else {
      const base=pick([20,40,50,80,100,200]);
      const pct=pick([10,20,25,50,75]);
      const part=base*pct/100;
      lastKey=`wp${pct}${base}`;
      quizShell('Solve the percent problem.', `<div class="bigq"><span class="hl">${part}</span> is what percent of <span class="hl">${base}</span>?</div>`, pbar(pct));
      numInput('', '%', ()=>checkPct(pct, `Make a fraction: ${part} out of ${base} = ${part}/${base}. Turn it into “out of 100”: ${part}/${base} = <b>${pct}/100</b> = <b>${pct}%</b>.`));
    }
  }
  function checkPct(ans, work){
    if(answered) return;
    const v=parseFloat($('ans').value); if(isNaN(v)) return;
    $('ans').disabled=true; $('checkBtn').style.display='none';
    finishAnswer(v===ans, work + `<br>Answer: <b>${ans}</b>.`);
  }

  // ---------- dispatch ----------
  function newRound(){
    clearTimers(); advanceReady=true; answered=false;
    if(mode==='learn'){ renderLearn(); return; }
    if(mode==='equiv') roundEquiv();
    else if(mode==='rate') roundRate();
    else roundPercent();
  }
  $('modeSeg').addEventListener('click', e=>{ const b=e.target.closest('button'); if(!b)return; mode=b.dataset.mode; [...$('modeSeg').children].forEach(x=>x.classList.toggle('on',x===b)); resetProgress(); newRound(); });
  $('levelSeg').addEventListener('click', e=>{ const b=e.target.closest('button.lvl'); if(!b)return; level=+b.dataset.lvl; [...$('levelSeg').children].forEach(x=>x.classList&&x.classList.toggle('on',x===b)); resetProgress(); newRound(); });
  document.addEventListener('click', e=>{ if(e.target && e.target.id==='nextBtn') tryAdvance(); });
  document.addEventListener('keydown', e=>{
    if(e.key!=='Enter') return;
    if(!answered && $('checkBtn')){ e.preventDefault(); $('checkBtn').click(); return; }
    if(answered){ e.preventDefault(); tryAdvance(); }
  });

  newRound();
})();
</script>
</body>
</html>
