<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Writing Workshop</title>
<style>
  :root {
    --ink:#1e293b; --muted:#64748b; --accent:#059669; --accent-soft:#d1fae5;
    --paper:#fffdf7; --line:#e2e8f0; --shadow:0 10px 30px rgba(5,150,105,.15);
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; color:var(--ink); background:linear-gradient(160deg,#ecfdf5,#f8fafc); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:24px 16px 60px; }
  h1 { font-size:26px; margin:6px 0 2px; letter-spacing:-.5px; }
  .sub { color:var(--muted); margin:0 0 16px; font-size:15px; text-align:center; max-width:540px; line-height:1.5; }
  .nav{ display:flex; gap:8px; background:#fff; padding:5px; border-radius:12px; box-shadow:var(--shadow); margin-bottom:14px; }
  .nav a, .nav button{ text-decoration:none; font-weight:800; font-size:14px; color:var(--muted); padding:8px 16px; border-radius:9px; border:none; background:transparent; font-family:inherit; cursor:pointer; }
  .nav button:hover{ background:var(--accent-soft); color:var(--accent); }

  .wrap { width:100%; max-width:820px; }

  /* type picker */
  .typegrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:16px; }
  .typecard { background:#fff; border-radius:20px; box-shadow:var(--shadow); padding:22px; cursor:pointer; border:3px solid transparent; text-align:left; font-family:inherit; }
  .typecard:hover { border-color:var(--accent); transform:translateY(-3px); }
  .typecard .ti { font-size:38px; } .typecard h3 { margin:8px 0 4px; font-size:20px; }
  .typecard p { margin:0; color:var(--muted); font-size:14px; line-height:1.45; }
  .typecard .cont { margin-top:10px; font-size:12.5px; font-weight:800; color:var(--accent); }

  /* stepper */
  .steps { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-bottom:16px; }
  .stepdot { display:flex; align-items:center; gap:6px; background:#fff; border:none; font-family:inherit; box-shadow:var(--shadow); border-radius:999px; padding:6px 12px; font-size:12.5px; font-weight:800; color:var(--muted); cursor:pointer; }
  .stepdot.on { background:var(--accent); color:#fff; }
  .stepdot.done { color:var(--accent); }
  .stepdot .num { width:18px; height:18px; border-radius:50%; background:var(--accent-soft); color:var(--accent); font-size:11px; display:flex; align-items:center; justify-content:center; }
  .stepdot.on .num { background:rgba(255,255,255,.25); color:#fff; }

  .card { background:#fff; border-radius:22px; box-shadow:var(--shadow); padding:26px; }
  .card .step-icon { font-size:30px; }
  .card h2 { margin:6px 0 6px; font-size:22px; }
  .teach { background:var(--accent-soft); border-left:3px solid var(--accent); border-radius:10px; padding:12px 15px; font-size:14.5px; line-height:1.6; color:#065f46; margin-bottom:16px; }

  .field { margin-bottom:18px; }
  .field label { display:block; font-weight:800; font-size:15px; margin-bottom:6px; }
  .field textarea, .field input { width:100%; font-family:inherit; font-size:16px; color:var(--ink); border:2px solid var(--line); border-radius:12px; padding:11px 13px; outline:none; resize:vertical; line-height:1.5; background:var(--paper); }
  .field textarea { min-height:64px; }
  .field textarea.big { min-height:130px; }
  .field input:focus, .field textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  .starters { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .starter { border:none; background:#f1f5f9; color:#475569; font-family:inherit; font-weight:700; font-size:12.5px; padding:6px 11px; border-radius:999px; cursor:pointer; }
  .starter:hover { background:var(--accent-soft); color:var(--accent); }

  .helper { background:#fffbeb; border:1.5px solid #fde68a; border-radius:12px; padding:12px 14px; margin-bottom:16px; }
  .helper h4 { margin:0 0 8px; font-size:13px; text-transform:uppercase; letter-spacing:.4px; color:#b45309; }
  .hookopt { display:flex; gap:10px; align-items:flex-start; padding:7px 0; border-top:1px solid #fde68a; font-size:13.5px; line-height:1.45; }
  .hookopt:first-of-type { border-top:none; }
  .hookopt b { color:#92400e; } .hookopt .ex { color:#a16207; font-style:italic; }
  .transrow { margin:4px 0; font-size:13px; }
  .transrow .tl { font-weight:800; color:#b45309; margin-right:6px; }
  .transrow .tw { display:inline-block; background:#fef3c7; color:#92400e; border-radius:6px; padding:2px 8px; margin:2px; font-weight:700; font-size:12px; }

  .stars { display:flex; gap:4px; font-size:30px; }
  .stars .st { cursor:pointer; color:#cbd5e1; } .stars .st.on { color:#f59e0b; }

  button.act { font-family:inherit; font-size:16px; font-weight:800; border:none; border-radius:14px; padding:12px 22px; cursor:pointer; }
  .btn-primary { background:var(--accent); color:#fff; } .btn-primary:hover { background:#047857; }
  .btn-ghost { background:var(--accent-soft); color:#047857; }
  .btn-row { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; justify-content:space-between; align-items:center; }
  .saved { font-size:12.5px; color:var(--muted); font-weight:700; }

  /* final essay */
  .essay { background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:26px 28px; font-size:16px; line-height:1.75; box-shadow:inset 0 0 0 1px #fff; font-family:Georgia,"Times New Roman",serif; }
  .essay p { margin:0 0 1em; white-space:pre-wrap; } .essay p:last-child { margin-bottom:0; }
  .essay .title { font-size:22px; font-weight:800; text-align:center; margin-bottom:10px; font-family:-apple-system,system-ui,sans-serif; }
  .essay .rpt-h { font-weight:800; margin:16px 0 3px; font-family:-apple-system,system-ui,sans-serif; color:#047857; }
  .wc { text-align:center; color:var(--muted); font-size:13px; font-weight:700; margin:10px 0 4px; }
  .checklist { margin-top:20px; }
  .checklist h3 { font-size:16px; margin:0 0 10px; }
  .checkitem { display:flex; gap:10px; align-items:flex-start; padding:7px 0; font-size:14px; cursor:pointer; }
  .checkitem input { margin-top:3px; width:18px; height:18px; accent-color:var(--accent); }
  .empty-note { color:var(--wrong,#dc2626); font-weight:700; font-size:13.5px; text-align:center; }
</style>
</head>
<body>
  <div class="nav">
    <a href="../index.html">🏠 Home</a>
    <button id="switchBtn" style="display:none">📄 Change type</button>
  </div>
  <h1>🖊️ Writing Workshop</h1>
  <p class="sub" id="sub">Write your OWN essay or book report, step by step — from “I don’t know where to start” to a finished piece you can be proud of.</p>

  <div class="wrap" id="wrap"></div>

<script src="data.js"></script>
<script>
(function(){
  const $ = id => document.getElementById(id);
  const W = window.WRITING;
  const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const KEY = t => 'writing:v1:'+t;

  let type=null, stepIdx=0, data={};

  function load(t){ try { return JSON.parse(localStorage.getItem(KEY(t))||'{}'); } catch(_){ return {}; } }
  function save(){ if(type) localStorage.setItem(KEY(type.id), JSON.stringify(data)); flashSaved(); }
  let savedTimer=null;
  function flashSaved(){ const el=$('savedMsg'); if(!el) return; el.textContent='✓ Saved'; clearTimeout(savedTimer); savedTimer=setTimeout(()=>{ if(el) el.textContent=''; },1200); }

  // ---------- TYPE PICKER ----------
  function renderPicker(){
    type=null; $('switchBtn').style.display='none';
    $('wrap').innerHTML = `<div class="typegrid">` + W.TYPES.map(t=>{
      const prog = hasProgress(t.id);
      return `<button class="typecard" data-type="${t.id}"><div class="ti">${t.icon}</div><h3>${t.name}</h3><p>${esc(t.blurb)}</p>`+
        (prog?`<div class="cont">▶ Continue where you left off</div>`:`<div class="cont">＋ Start writing</div>`)+`</button>`;
    }).join('') + `</div>`;
    $('wrap').querySelectorAll('[data-type]').forEach(b=>b.onclick=()=>openType(b.dataset.type));
  }
  function hasProgress(tid){ const d=load(tid); return Object.values(d).some(v=>String(v).trim()); }

  function openType(tid){
    type = W.TYPES.find(t=>t.id===tid);
    data = load(tid);
    stepIdx = 0;
    $('switchBtn').style.display='';
    renderStep();
  }

  // ---------- STEPS ----------
  function totalSteps(){ return type.sections.length + 1; }   // +1 for "Put It Together"
  function fieldVal(sk, fk){ const v = data[sk] && data[sk][fk]; return (v==null) ? '' : String(v); }
  function setField(sk, fk, v){ (data[sk]=data[sk]||{})[fk]=v; save(); }

  function renderSteps(){
    const dots = type.sections.map((s,i)=>{
      const done = s.fields.some(f=>fieldVal(s.key,f.key).trim());
      return `<button class="stepdot ${i===stepIdx?'on':''} ${done?'done':''}" data-i="${i}"><span class="num">${i+1}</span>${s.icon}</button>`;
    }).join('') + `<button class="stepdot ${stepIdx===type.sections.length?'on':''}" data-i="${type.sections.length}"><span class="num">✓</span>📄 Finish</button>`;
    return `<div class="steps">${dots}</div>`;
  }

  function renderStep(){
    if(stepIdx >= type.sections.length){ return renderFinal(); }
    const s = type.sections[stepIdx];
    let html = renderSteps();
    html += `<div class="card"><div class="step-icon">${s.icon}</div><h2>${esc(s.title)}</h2>`;
    html += `<div class="teach">💡 ${esc(s.teach)}</div>`;
    if(s.showHooks) html += hooksHTML();
    if(s.showTransitions) html += transitionsHTML();
    s.fields.forEach(f=>{
      let val = fieldVal(s.key, f.key);
      if(!val && f.copyFrom){ // seed from a planning field
        for(const sec of type.sections){ if(sec.fields.some(x=>x.key===f.copyFrom)){ val = fieldVal(sec.key, f.copyFrom); break; } }
      }
      html += `<div class="field"><label>${esc(f.label)}</label>`;
      if(f.stars){ html += starsHTML(val); }
      else if(f.big){ html += `<textarea class="big" data-sk="${s.key}" data-fk="${f.key}" placeholder="${esc(f.placeholder||'')}">${esc(val)}</textarea>`; }
      else { html += `<textarea data-sk="${s.key}" data-fk="${f.key}" placeholder="${esc(f.placeholder||'')}">${esc(val)}</textarea>`; }
      if(f.starters && f.starters.length){ html += `<div class="starters">`+f.starters.map(st=>`<button class="starter" data-ins="${esc(st)}">${esc(st)}</button>`).join('')+`</div>`; }
      html += `</div>`;
    });
    html += `<div class="btn-row">`+
      (stepIdx>0?`<button class="act btn-ghost" id="prevBtn">← Back</button>`:`<span></span>`)+
      `<span class="saved" id="savedMsg"></span>`+
      `<button class="act btn-primary" id="nextBtn">${stepIdx===type.sections.length-1?'See my writing →':'Next step →'}</button>`+
      `</div></div>`;
    $('wrap').innerHTML = html;
    wireStep(s);
  }

  function wireStep(s){
    $('wrap').querySelectorAll('[data-i]').forEach(b=>b.onclick=()=>{ stepIdx=+b.dataset.i; renderStep(); });
    $('wrap').querySelectorAll('textarea').forEach(t=>{
      // seed copyFrom value into storage if empty and prefilled
      if(t.value.trim() && !fieldVal(t.dataset.sk,t.dataset.fk).trim()) setField(t.dataset.sk,t.dataset.fk,t.value);
      t.addEventListener('input', ()=> setField(t.dataset.sk, t.dataset.fk, t.value));
      t.addEventListener('focus', ()=>{ activeField = t; });
    });
    $('wrap').querySelectorAll('.starter').forEach(b=>b.onclick=()=>insertStarter(b.dataset.ins));
    if($('prevBtn')) $('prevBtn').onclick=()=>{ stepIdx--; renderStep(); };
    $('nextBtn').onclick=()=>{ stepIdx++; renderStep(); window.scrollTo(0,0); };
  }
  let activeField=null;
  function insertStarter(text){
    // insert into the last-focused textarea in this step, else the first
    const areas=[...$('wrap').querySelectorAll('textarea')];
    let t = activeField && areas.includes(activeField) ? activeField : areas[0];
    if(!t) return;
    const cur=t.value;
    t.value = cur ? (cur.replace(/\s*$/,'') + ' ' + text + ' ') : (text + ' ');
    setField(t.dataset.sk, t.dataset.fk, t.value);
    t.focus();
  }

  function starsHTML(val){
    const n=parseInt(val)||0;
    return `<div class="stars" data-sk="opinion" data-fk="rating">`+[1,2,3,4,5].map(i=>`<span class="st ${i<=n?'on':''}" data-n="${i}">★</span>`).join('')+`</div>`;
  }
  // delegate star clicks
  document.addEventListener('click', e=>{
    const st=e.target.closest('.stars .st'); if(!st) return;
    const n=+st.dataset.n, box=st.closest('.stars');
    setField(box.dataset.sk, box.dataset.fk, n);
    [...box.children].forEach((c,i)=>c.classList.toggle('on', i<n));
  });

  function hooksHTML(){
    return `<div class="helper"><h4>✨ Pick a hook style</h4>`+
      W.HOOKS.map(h=>`<div class="hookopt"><b>${esc(h.type)}:</b><span>${esc(h.how)} <span class="ex">e.g., “${esc(h.ex)}”</span></span></div>`).join('')+`</div>`;
  }
  function transitionsHTML(){
    return `<div class="helper"><h4>🔗 Transition words to connect ideas</h4>`+
      Object.entries(W.TRANSITIONS).map(([k,ws])=>`<div class="transrow"><span class="tl">${esc(k)}:</span>${ws.map(w=>`<span class="tw">${esc(w)}</span>`).join('')}</div>`).join('')+`</div>`;
  }

  // ---------- FINAL ASSEMBLE ----------
  function assemble(){
    const parts=[]; let titleLine='';
    type.sections.filter(s=>s.inFinal).forEach(s=>{
      const vals = s.fields.filter(f=>!f.stars).map(f=>fieldVal(s.key,f.key).trim()).filter(Boolean);
      if(!vals.length) return;
      if(type.id==='bookreport' && s.key==='book'){
        titleLine = fieldVal('book','title').trim();
        const by=fieldVal('book','author').trim(), g=fieldVal('book','genre').trim();
        let sub=[]; if(by) sub.push('by '+by); if(g) sub.push('('+g+')');
        parts.push({heading:'', text: sub.join(' ')});
        return;
      }
      const text = s.join==='lines' ? vals.join('\n') : vals.join(' ');
      parts.push({ heading: s.heading||'', text });
    });
    return { titleLine, parts };
  }

  function renderFinal(){
    const a = assemble();
    const anyText = a.parts.some(p=>p.text.trim());
    const bodyHTML = a.parts.map(p=> (p.heading?`<div class="rpt-h">${esc(p.heading)}</div>`:'') + `<p>${esc(p.text)}</p>`).join('');
    const plain = buildPlainText(a);
    const words = plain.split(/\s+/).filter(Boolean).length;
    let html = renderSteps();
    html += `<div class="card"><div class="step-icon">📄</div><h2>Your ${esc(type.name)}</h2>`;
    if(!anyText){ html += `<p class="empty-note">Your writing will appear here as you fill in the steps. Head back and add your ideas!</p>`; }
    else {
      html += `<div class="wc">📏 ${words} words</div>`;
      html += `<div class="essay">`+ (a.titleLine?`<div class="title">${esc(a.titleLine)}</div>`:'') + bodyHTML + `</div>`;
      html += `<div class="btn-row" style="justify-content:center;gap:12px"><button class="act btn-primary" id="copyBtn">📋 Copy</button><button class="act btn-ghost" id="dlBtn">⬇️ Download</button></div>`;
      html += `<div class="checklist"><h3>✅ Now revise — check each one:</h3>`+
        W.CHECKLIST.map((c,i)=>`<label class="checkitem"><input type="checkbox"> <span>${esc(c)}</span></label>`).join('')+`</div>`;
    }
    html += `<div class="btn-row"><button class="act btn-ghost" id="prevBtn">← Keep editing</button><button class="act btn-ghost" id="resetBtn" style="color:#dc2626">🗑️ Start this over</button></div></div>`;
    $('wrap').innerHTML = html;
    $('wrap').querySelectorAll('[data-i]').forEach(b=>b.onclick=()=>{ stepIdx=+b.dataset.i; renderStep(); });
    $('prevBtn').onclick=()=>{ stepIdx=type.sections.length-1; renderStep(); };
    $('resetBtn').onclick=()=>{ if(confirm('Erase this '+type.name+' and start fresh? This can’t be undone.')){ localStorage.removeItem(KEY(type.id)); data={}; stepIdx=0; renderStep(); } };
    if($('copyBtn')) $('copyBtn').onclick=()=>{ navigator.clipboard.writeText(plain).then(()=>{ $('copyBtn').textContent='✓ Copied!'; setTimeout(()=>$('copyBtn').textContent='📋 Copy',1400); }); };
    if($('dlBtn')) $('dlBtn').onclick=()=>{ const blob=new Blob([plain],{type:'text/plain'}); const url=URL.createObjectURL(blob); const link=document.createElement('a'); link.href=url; link.download=(a.titleLine||type.name).replace(/[^a-z0-9]+/gi,'-').toLowerCase()+'.txt'; link.click(); URL.revokeObjectURL(url); };
  }
  function buildPlainText(a){
    let out=''; if(a.titleLine) out+=a.titleLine+'\n\n';
    a.parts.forEach(p=>{ if(p.heading) out+=p.heading+'\n'; if(p.text) out+=p.text+'\n\n'; });
    return out.trim();
  }

  $('switchBtn').onclick=()=>{ renderPicker(); };
  renderPicker();
})();
</script>
</body>
</html>
