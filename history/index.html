<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>History Heroes</title>
<style>
  :root{
    --ink:#2b2118; --muted:#7c6f5f; --accent:#b45309; --accent-soft:#fef3c7;
    --accent2:#7c3aed; --correct:#16a34a; --wrong:#dc2626; --gold:#f59e0b;
    --shadow:0 10px 30px rgba(80,60,20,.14);
  }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; color:var(--ink);
    background:linear-gradient(160deg,#fdf6ec,#f3ede2); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px 14px 60px; }
  .nav{ display:flex; gap:8px; background:#fff; padding:5px; border-radius:12px; box-shadow:var(--shadow); margin-bottom:14px; }
  .nav a,.nav button{ text-decoration:none; font-family:inherit; font-weight:800; font-size:14px; color:var(--muted); padding:8px 14px; border-radius:9px; border:none; background:transparent; cursor:pointer; }
  .nav a.on,.nav button.on{ background:var(--accent); color:#fff; }
  h1{ font-size:28px; margin:4px 0 2px; letter-spacing:-.5px; }
  .sub{ color:var(--muted); margin:0 0 16px; font-size:15px; text-align:center; }

  .gametabs{ display:flex; gap:6px; background:#fff; padding:5px; border-radius:14px; box-shadow:var(--shadow); margin-bottom:16px; flex-wrap:wrap; justify-content:center; }
  .gametabs button{ font-family:inherit; font-weight:800; font-size:14px; border:none; background:transparent; color:var(--muted); padding:9px 15px; border-radius:10px; cursor:pointer; transition:background .15s, color .15s; }
  .gametabs button:hover{ background:var(--accent-soft); }
  .gametabs button.on{ background:var(--accent); color:#fff; }

  .scorebar{ display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; justify-content:center; }
  .chip{ background:#fff; border-radius:999px; padding:8px 16px; font-weight:700; font-size:14px; box-shadow:var(--shadow); display:flex; align-items:center; gap:6px; }
  .chip small{ color:var(--muted); font-weight:600; } .chip.streak{ color:#ea580c; }

  .menu{ display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:18px; width:100%; max-width:820px; }
  .gamecard{ text-align:left; background:#fff; border-radius:20px; box-shadow:var(--shadow); padding:22px; cursor:pointer; border:2px solid transparent; transition:transform .12s, border-color .12s; }
  .gamecard:hover{ transform:translateY(-3px); border-color:var(--accent); }
  .gamecard .icon{ font-size:34px; }
  .gamecard h3{ margin:8px 0 4px; font-size:19px; }
  .gamecard p{ margin:0; color:var(--muted); font-size:14px; line-height:1.4; }

  .stage{ width:100%; max-width:760px; }
  .hidden{ display:none !important; }
  .card{ background:#fff; border-radius:22px; box-shadow:var(--shadow); padding:24px; }
  .prompt{ font-size:21px; font-weight:800; text-align:center; margin:0 0 6px; line-height:1.35; }
  .promptsub{ text-align:center; color:var(--muted); font-size:14px; margin:0 0 16px; }
  .feedback{ min-height:26px; margin-top:14px; font-weight:800; font-size:17px; text-align:center; }
  .feedback.good{ color:var(--correct); } .feedback.bad{ color:var(--wrong); }
  .why{ text-align:center; color:var(--muted); font-size:14px; margin-top:6px; }

  .btn{ font-family:inherit; font-size:16px; font-weight:800; border:none; border-radius:14px; padding:13px 22px; cursor:pointer; transition:transform .1s, background .15s; }
  .btn:active{ transform:scale(.96); }
  .btn-primary{ background:var(--accent); color:#fff; } .btn-primary:hover{ background:#92400e; }
  .btn-ghost{ background:var(--accent-soft); color:var(--accent); }
  .center{ display:flex; gap:12px; justify-content:center; margin-top:18px; flex-wrap:wrap; }

  /* person option tiles (Who Did It) */
  .people{ display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; }
  .person{ background:#fff; border:3px solid #e7ddcb; border-radius:16px; padding:12px; cursor:pointer; text-align:center; transition:border-color .12s, transform .1s; }
  .person:active{ transform:scale(.97); }
  .person img{ width:84px; height:84px; object-fit:cover; border-radius:12px; background:#f3ede2; }
  .person .nm{ font-weight:800; font-size:14px; margin-top:8px; }
  .person .meta{ font-size:12px; color:var(--muted); }
  .person.correct{ border-color:var(--correct); background:#dcfce7; }
  .person.wrong{ border-color:var(--wrong); background:#fee2e2; }
  .person[disabled]{ opacity:.6; cursor:default; }

  .factbox{ background:var(--accent-soft); border-radius:14px; padding:18px 20px; font-size:19px; font-weight:700; text-align:center; margin-bottom:16px; line-height:1.4; }
  .revealbio{ display:flex; gap:14px; align-items:flex-start; text-align:left; background:#fbf7ef; border:2px solid #ece3d3; border-radius:14px; padding:14px 16px; margin-top:14px; }
  .revealbio img{ width:70px; height:70px; object-fit:cover; border-radius:12px; background:#f3ede2; flex:0 0 auto; }
  .revealbio .rb-nm{ font-weight:900; font-size:17px; }
  .revealbio .rb-meta{ color:var(--muted); font-weight:700; font-size:12px; margin:2px 0 6px; }
  .revealbio .rb-bio{ font-size:14px; line-height:1.5; }

  /* flashcard */
  .flip{ perspective:1200px; max-width:460px; margin:0 auto 8px; }
  .flip-inner{ position:relative; transition:transform .6s; transform-style:preserve-3d; min-height:440px; }
  .flip.flipped .flip-inner{ transform:rotateY(180deg); }
  .face{ position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:20px; padding:26px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
  .face.front{ background:linear-gradient(160deg,#fff7ed,#fef3c7); border:2px solid #fcd34d; }
  .quotebar{ font-size:23px; font-weight:800; font-style:italic; line-height:1.4; text-align:center; margin-bottom:16px; color:var(--ink); }
  .face.front .qmark{ font-size:64px; }
  .face.front .hint{ margin-top:12px; color:var(--muted); font-weight:700; font-size:14px; }
  .face.back{ background:#fff; border:2px solid #e7ddcb; transform:rotateY(180deg); justify-content:flex-start; overflow:auto; }
  .face.back img{ width:96px; height:96px; object-fit:cover; border-radius:14px; margin-bottom:8px; background:#f3ede2; }
  .face.back .nm{ font-size:21px; font-weight:900; }
  .face.back .meta{ color:var(--muted); font-weight:700; font-size:13px; margin:2px 0 10px; }
  .face.back .bio{ font-size:14px; line-height:1.5; color:var(--ink); }
  .pron{ color:var(--accent2); font-weight:700; font-size:13px; margin:2px 0; }
  .pron::before{ content:'🔊 '; }
  .qstatus{ margin-top:10px; font-size:12px; font-weight:800; padding:6px 10px; border-radius:9px; text-align:left; }
  .qstatus.st-para{ background:#eef2ff; color:#4f46e5; }
  .qstatus.st-attr{ background:#f1f5f9; color:#475569; }
  .qstatus.st-mis{ background:#fef2f2; color:#dc2626; }
  .qctx{ margin-top:12px; padding-top:12px; border-top:1px dashed #e7ddcb; text-align:left; }
  .qctx .qctx-h{ font-weight:800; font-size:12px; color:var(--accent); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
  .qctx .qctx-t{ font-size:13.5px; line-height:1.5; color:var(--muted); }
  .person .pron{ font-size:11px; margin-top:2px; }
  .revealbio .pron{ font-size:12px; margin:2px 0 6px; }

  /* reading */
  .passage{ background:#fbf7ef; border:2px solid #ece3d3; border-radius:14px; padding:18px 20px; font-size:16px; line-height:1.7; margin-bottom:16px; overflow:hidden; }
  .passage h4{ margin:0 0 8px; font-size:18px; }
  .passage .pimg{ float:right; width:96px; height:96px; object-fit:cover; border-radius:12px; margin:0 0 10px 14px; background:#f3ede2; }
  .passage .ptext{ min-height:60px; }
  .qtext{ font-weight:800; font-size:17px; text-align:center; margin:6px 0 12px; }
  .choices{ display:flex; flex-direction:column; gap:10px; }
  .choice{ background:#fff; border:3px solid #e7ddcb; border-radius:14px; padding:13px 16px; font-weight:700; font-size:15px; cursor:pointer; text-align:left; }
  .choice:hover{ border-color:var(--accent); }
  .choice.correct{ border-color:var(--correct); background:#dcfce7; }
  .choice.wrong{ border-color:var(--wrong); background:#fee2e2; }
  .choice[disabled]{ cursor:default; }
  .qdots{ text-align:center; color:var(--muted); font-weight:800; font-size:13px; margin-bottom:8px; }

  #confetti{ position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50; }
  .conf{ position:absolute; top:-20px; width:11px; height:14px; border-radius:2px; animation:fall linear forwards; }
  @keyframes fall{ to{ transform:translateY(105vh) rotate(720deg); } }

  .credit{ margin-top:26px; color:var(--muted); font-size:11px; text-align:center; max-width:520px; }
</style>
</head>
<body>
  <div id="confetti"></div>
  <div class="nav">
    <a href="../index.html">🏠 Home</a>
    <button id="navMenu" class="on">🏺 Menu</button>
  </div>
  <h1>🏺 History Heroes</h1>
  <p class="sub" id="subtitle">Meet people who changed the world — pick a game!</p>

  <div class="gametabs" id="gametabs">
    <button data-game="match">🧩 Who Did It?</button>
    <button data-game="quote">💬 Quote Flip</button>
    <button data-game="read">🔎 Reading Detective</button>
  </div>

  <div class="scorebar" id="scorebar" style="display:none">
    <div class="chip">✅ <span id="correctCount">0</span> <small>correct</small></div>
    <div class="chip streak">🔥 <span id="streak">0</span> <small>streak</small></div>
  </div>

  <div class="menu" id="menu">
    <button class="gamecard" data-game="match"><span class="icon">🧩</span><h3>Who Did It?</h3><p>Match world-changing people to what they did — the great, the brilliant, and sometimes the harmful.</p></button>
    <button class="gamecard" data-game="quote"><span class="icon">💬</span><h3>Quote Flip</h3><p>Read a famous quote, then flip the card to meet who said it and hear their story.</p></button>
    <button class="gamecard" data-game="read"><span class="icon">🔎</span><h3>Reading Detective</h3><p>Read short true stories and answer test-style questions — build real reading skills.</p></button>
  </div>

  <div class="stage hidden" id="stage"></div>
  <div class="credit" id="credit"></div>

<script src="library.js?v=7"></script>
<script src="authored.js?v=6"></script>
<script src="app.js?v=10"></script>
</body>
</html>
