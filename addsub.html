<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Add &amp; Subtract</title>
<style>
  :root{
    --ink:#1e293b; --muted:#64748b; --accent:#4f46e5; --accent-soft:#eef2ff;
    --correct:#16a34a; --wrong:#dc2626; --line:#94a3b8; --hi:#f59e0b;
    --shadow:0 10px 30px rgba(30,41,99,.12);
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; color:var(--ink);
    background:linear-gradient(160deg,#eef2ff,#f8fafc); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:22px 16px 60px; }
  .nav{ display:flex; gap:8px; background:#fff; padding:5px; border-radius:12px; box-shadow:var(--shadow); margin-bottom:14px; }
  .nav a{ text-decoration:none; font-weight:800; font-size:14px; color:var(--muted); padding:8px 14px; border-radius:9px; }
  .nav a.on{ background:var(--accent); color:#fff; }
  h1{ font-size:26px; margin:4px 0 2px; letter-spacing:-.5px; }
  .sub{ color:var(--muted); margin:0 0 18px; font-size:15px; }

  .controls{ display:flex; flex-direction:column; align-items:center; gap:12px; margin-bottom:16px; }
  .seg{ display:flex; background:#fff; border-radius:14px; padding:5px; box-shadow:var(--shadow); gap:4px; }
  .seg button{ border:none; background:transparent; font-family:inherit; font-weight:800; font-size:16px; padding:10px 20px; border-radius:10px; cursor:pointer; color:var(--muted); transition:background .15s,color .15s; }
  .seg button.on{ background:var(--accent); color:#fff; }
  .levels{ display:flex; gap:8px; align-items:center; }
  .levels .lbl{ font-size:13px; color:var(--muted); font-weight:700; }
  .lvl{ width:42px; height:42px; border:none; border-radius:12px; font-weight:800; font-size:17px; cursor:pointer; background:#fff; color:var(--muted); box-shadow:var(--shadow); transition:transform .1s; }
  .lvl:active{ transform:scale(.94); } .lvl.on{ background:var(--accent); color:#fff; }

  .scorebar{ display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; justify-content:center; }
  .chip{ background:#fff; border-radius:999px; padding:8px 16px; font-weight:700; font-size:14px; box-shadow:var(--shadow); display:flex; align-items:center; gap:6px; }
  .chip small{ color:var(--muted); font-weight:600; } .chip.streak{ color:#ea580c; }

  .layout{ display:flex; gap:24px; width:100%; max-width:1000px; align-items:stretch; flex-wrap:wrap; }
  .card{ background:#fff; border-radius:24px; box-shadow:var(--shadow); padding:28px; }
  .quiz{ flex:1 1 340px; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:420px; }
  .question{ font-size:64px; font-weight:800; letter-spacing:-2px; margin:4px 0 24px; text-align:center; }
  .question .op{ color:var(--accent); }
  .answer-input{ font-size:44px; font-weight:800; text-align:center; width:220px; padding:12px; border:3px solid #e2e8f0; border-radius:18px; outline:none; color:var(--ink); -moz-appearance:textfield; transition:border-color .15s,box-shadow .15s; }
  .answer-input::-webkit-outer-spin-button,.answer-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .answer-input:focus{ border-color:var(--accent); box-shadow:0 0 0 4px var(--accent-soft); }
  .answer-input.correct{ border-color:var(--correct); box-shadow:0 0 0 4px #dcfce7; }
  .answer-input.wrong{ border-color:var(--wrong); box-shadow:0 0 0 4px #fee2e2; animation:shake .4s; }
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-5px)}}
  .btn-row{ display:flex; gap:12px; margin-top:22px; flex-wrap:wrap; justify-content:center; }
  button.act{ font-family:inherit; font-size:17px; font-weight:700; border:none; border-radius:14px; padding:14px 24px; cursor:pointer; transition:transform .1s,background .15s; }
  button.act:active{ transform:scale(.96); }
  .btn-primary{ background:var(--accent); color:#fff; } .btn-primary:hover{ background:#4338ca; }
  .btn-ghost{ background:var(--accent-soft); color:var(--accent); } .btn-ghost:hover{ background:#e0e7ff; }
  .choices{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:22px; width:100%; max-width:320px; }
  .choices.hidden{ display:none; }
  .choice{ background:#fff; border:3px solid #e2e8f0; border-radius:16px; font-size:28px; font-weight:800; padding:16px 0; color:var(--ink); cursor:pointer; }
  .choice:hover{ border-color:var(--accent); background:var(--accent-soft); }
  .choice.correct{ border-color:var(--correct); background:#dcfce7; color:var(--correct); }
  .choice.wrong{ border-color:var(--wrong); background:#fee2e2; color:var(--wrong); }
  .feedback{ min-height:26px; margin-top:16px; font-weight:700; font-size:18px; text-align:center; }
  .feedback.good{ color:var(--correct); } .feedback.bad{ color:var(--wrong); }

  .visual{ flex:1 1 380px; display:flex; flex-direction:column; }
  .visual.hidden{ display:none; }
  .pop{ animation:pop .45s cubic-bezier(.2,.9,.3,1.3); }
  @keyframes pop{0%{transform:scale(.85) translateY(14px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}
  .visual h2{ margin:0 0 4px; font-size:20px; }
  .visual .hint-txt{ color:var(--muted); font-size:14px; margin:0 0 12px; }
  #line{ width:100%; height:auto; }

  #confetti{ position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50; }
  .conf{ position:absolute; top:-20px; width:11px; height:14px; border-radius:2px; animation:fall linear forwards; }
  @keyframes fall{ to{ transform:translateY(105vh) rotate(720deg); } }
  #streakBanner{ position:fixed; left:50%; top:22%; transform:translate(-50%,-50%) scale(.6); background:linear-gradient(135deg,#f59e0b,#ea580c); color:#fff; font-weight:900; font-size:30px; padding:20px 38px; border-radius:22px; box-shadow:0 18px 50px rgba(234,88,12,.45); z-index:60; opacity:0; pointer-events:none; text-align:center; }
  #streakBanner small{ display:block; font-size:15px; font-weight:700; opacity:.9; margin-top:4px; }
  #streakBanner.show{ animation:banner 1.9s cubic-bezier(.2,.9,.3,1.3) forwards; }
  @keyframes banner{0%{opacity:0;transform:translate(-50%,-50%) scale(.6)}15%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}28%{transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-60%) scale(.95)}}
  @media (max-width:720px){ .question{font-size:48px} .quiz{min-height:auto} }
</style>
</head>
<body>
  <div id="confetti"></div>
  <div id="streakBanner"></div>

  <div class="nav">
    <a href="index.html">📊 Blocks</a>
    <a href="chart.html">🔢 Chart</a>
    <a href="addsub.html" class="on">➕ Add &amp; Subtract</a>
  </div>

  <h1>➕➖ Add &amp; Subtract</h1>
  <p class="sub">Type the answer, or tap <b>Hint</b> for choices.</p>

  <div class="controls">
    <div class="seg" id="modeSeg">
      <button data-mode="add" class="on">➕ Add</button>
      <button data-mode="sub">➖ Subtract</button>
    </div>
    <div class="levels" id="levelSeg">
      <span class="lbl">Level</span>
      <button class="lvl on" data-lvl="1">1</button>
      <button class="lvl" data-lvl="2">2</button>
      <button class="lvl" data-lvl="3">3</button>
      <button class="lvl" data-lvl="4">4</button>
      <button class="lvl" data-lvl="5">5</button>
    </div>
  </div>

  <div class="scorebar">
    <div class="chip">✅ <span id="correctCount">0</span> <small>correct</small></div>
    <div class="chip">🎯 <span id="totalCount">0</span> <small>tried</small></div>
    <div class="chip streak">🔥 <span id="streak">0</span> <small>streak</small></div>
  </div>

  <div class="layout">
    <div class="card quiz">
      <div class="question" id="question"></div>
      <input class="answer-input" id="answer" type="number" inputmode="numeric" placeholder="?" autocomplete="off">
      <div class="btn-row">
        <button class="act btn-primary" id="checkBtn">Check</button>
        <button class="act btn-ghost" id="hintBtn">💡 Hint</button>
      </div>
      <div class="choices hidden" id="choices"></div>
      <div class="feedback" id="feedback"></div>
      <div class="btn-row" id="nextRow" style="display:none">
        <button class="act btn-primary" id="nextBtn">Next question ➡️</button>
      </div>
    </div>

    <div class="card visual hidden" id="visualCard">
      <h2 id="visualTitle"></h2>
      <p class="hint-txt" id="visualHint"></p>
      <svg id="line" viewBox="0 0 480 150" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

<script>
(function(){
  const $ = id => document.getElementById(id);
  const rand=(lo,hi)=>Math.floor(Math.random()*(hi-lo+1))+lo;
  const pick=a=>a[Math.floor(Math.random()*a.length)];
  const SVGNS="http://www.w3.org/2000/svg";

  // Level -> operand range. Bigger levels = bigger numbers.
  const LEVELS = { 1:[1,5], 2:[1,10], 3:[5,20], 4:[10,50], 5:[20,100] };

  let mode='add', level=1, P=null, answered=false;
  let correct=0,total=0,streak=0;

  function makeProblem(){
    const [lo,hi]=LEVELS[level];
    const x=rand(lo,hi), y=rand(lo,hi);
    if(mode==='add'){
      return { display:`${x} <span class="op">+</span> ${y}`, answer:x+y, start:x, delta:y, result:x+y, lineMax:x+y };
    } else {
      // (x+y) - y = x  → keeps operands in range, answer never negative
      const m=x+y;
      return { display:`${m} <span class="op">−</span> ${y}`, answer:x, start:m, delta:-y, result:x, lineMax:m };
    }
  }

  function newQuestion(){
    P=makeProblem(); answered=false;
    $('question').innerHTML=P.display;
    const inp=$('answer'); inp.value=''; inp.className='answer-input'; inp.disabled=false;
    $('feedback').textContent=''; $('feedback').className='feedback';
    $('choices').className='choices hidden'; $('choices').innerHTML='';
    $('nextRow').style.display='none'; $('checkBtn').style.display=''; $('hintBtn').style.display='';
    $('visualCard').className='card visual hidden';
    inp.focus();
  }

  function niceStep(range){ for(const s of [1,2,5,10,20,25,50,100]){ if(range/s<=13) return s; } return 100; }

  function buildLine(){
    const svg=$('line'); while(svg.firstChild) svg.removeChild(svg.firstChild);
    const W=480,H=150,padL=34,padR=34,y0=105,innerW=W-padL-padR;
    const step=niceStep(P.lineMax || 1);
    const maxTick=Math.max(step, Math.ceil((P.lineMax)/step)*step);
    const X=v=> padL + (v/maxTick)*innerW;

    const add=(tag,attrs,text)=>{ const e=document.createElementNS(SVGNS,tag);
      for(const k in attrs) e.setAttribute(k,attrs[k]); if(text!=null) e.textContent=text; svg.appendChild(e); return e; };

    // arrowhead marker
    const defs=document.createElementNS(SVGNS,'defs');
    defs.innerHTML=`<marker id="arw" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="var(--accent)"/></marker>`;
    svg.appendChild(defs);

    // baseline
    add('line',{x1:padL,y1:y0,x2:W-padR,y2:y0,stroke:'var(--line)','stroke-width':2});
    // ticks + labels
    for(let t=0;t<=maxTick;t+=step){
      const x=X(t);
      add('line',{x1:x,y1:y0-5,x2:x,y2:y0+5,stroke:'var(--line)','stroke-width':2});
      add('text',{x:x,y:y0+22,'text-anchor':'middle','font-size':12,'font-weight':700,fill:'var(--muted)'}, t);
    }

    // start marker
    const xs=X(P.start), xe=X(P.result);
    add('circle',{cx:xs,cy:y0,r:5,fill:'var(--accent)'});
    add('text',{x:xs,y:y0-52,'text-anchor':'middle','font-size':13,'font-weight':800,fill:'var(--ink)'}, P.start);

    // jump arc (start -> result), bulging up, with arrowhead
    const midx=(xs+xe)/2, peak=y0-46;
    add('path',{d:`M ${xs} ${y0-6} Q ${midx} ${peak} ${xe} ${y0-6}`, fill:'none', stroke:'var(--accent)','stroke-width':3,'marker-end':'url(#arw)'});
    add('text',{x:midx,y:peak-4,'text-anchor':'middle','font-size':14,'font-weight':800,fill:'var(--accent)'}, (P.delta>0?'+':'−')+Math.abs(P.delta));

    // result marker (answer) highlighted
    add('circle',{cx:xe,cy:y0,r:8,fill:'var(--hi)',stroke:'#fff','stroke-width':2});
    add('text',{x:xe,y:y0-16,'text-anchor':'middle','font-size':16,'font-weight':900,fill:'#b45309'}, P.result);
  }

  function celebrate(n){
    const msgs={5:'🌟 5 in a row!',10:'🔥 10 streak!',15:'⚡ 15 in a row!',20:'🏆 20 streak!'};
    const b=$('streakBanner'); b.innerHTML=`${msgs[n]||'🌟 '+n+' in a row!'}<small>Keep it going!</small>`;
    b.classList.remove('show'); void b.offsetWidth; b.classList.add('show');
    const colors=['#f59e0b','#4f46e5','#16a34a','#dc2626','#0ea5e9','#ec4899']; const box=$('confetti');
    for(let i=0;i<90;i++){ const c=document.createElement('div'); c.className='conf'; c.style.left=Math.random()*100+'vw';
      c.style.background=colors[i%colors.length]; c.style.animationDuration=(1.6+Math.random()*1.4)+'s'; c.style.animationDelay=(Math.random()*0.4)+'s';
      box.appendChild(c); setTimeout(()=>c.remove(),3400); }
  }

  function finish(ok){
    answered=true; total++;
    if(ok){ correct++; streak++; } else streak=0;
    $('correctCount').textContent=correct; $('totalCount').textContent=total; $('streak').textContent=streak;
    const fb=$('feedback');
    if(ok){ fb.textContent=pick(['🎉 Correct!','⭐ Nice work!','✅ You got it!','🚀 Great job!']); fb.className='feedback good'; }
    else { fb.textContent=`The answer is ${P.answer}.`; fb.className='feedback bad'; }
    $('answer').disabled=true; $('checkBtn').style.display='none'; $('hintBtn').style.display='none';
    $('nextRow').style.display='flex'; $('nextBtn').focus();

    const vc=$('visualCard');
    $('visualTitle').textContent = mode==='add' ? 'Count on the number line' : 'Count back on the number line';
    $('visualHint').innerHTML = mode==='add'
      ? `Start at <b>${P.start}</b>, jump forward <b>${P.delta}</b> → land on <b>${P.result}</b>.`
      : `Start at <b>${P.start}</b>, jump back <b>${Math.abs(P.delta)}</b> → land on <b>${P.result}</b>.`;
    vc.className='card visual pop';
    buildLine();
    vc.scrollIntoView({behavior:'smooth',block:'nearest'});
    if(ok && streak>0 && streak%5===0) celebrate(streak);
  }

  function check(){
    if(answered) return;
    const v=parseInt($('answer').value,10);
    if(isNaN(v)){ $('answer').focus(); return; }
    if(v===P.answer){ $('answer').className='answer-input correct'; finish(true); }
    else{ $('answer').className='answer-input wrong'; streak=0; $('streak').textContent=streak;
      $('feedback').textContent='Not quite — try again or tap 💡 Hint.'; $('feedback').className='feedback bad';
      setTimeout(()=>{ if(!answered){ $('answer').className='answer-input'; $('answer').select(); } },500); }
  }

  function showHint(){
    if(answered) return;
    const box=$('choices'); if(box.childElementCount){ box.className='choices'; return; }
    const ans=P.answer; const opts=new Set([ans]);
    while(opts.size<4){ const k=rand(1,3)*(Math.random()<.5?-1:1); let cand=ans+k; if(cand<0) cand=ans+Math.abs(k); opts.add(cand); }
    const sh=[...opts].sort(()=>Math.random()-.5);
    box.className='choices'; box.innerHTML='';
    sh.forEach(v=>{ const b=document.createElement('button'); b.className='choice'; b.textContent=v;
      b.onclick=()=>{ if(answered) return; if(v===ans){ b.classList.add('correct'); finish(true);} else { b.classList.add('wrong'); b.disabled=true; streak=0; $('streak').textContent=streak; } };
      box.appendChild(b); });
  }

  $('modeSeg').addEventListener('click', e=>{ const b=e.target.closest('button'); if(!b) return;
    mode=b.dataset.mode; [...$('modeSeg').children].forEach(x=>x.classList.toggle('on',x===b)); newQuestion(); });
  $('levelSeg').addEventListener('click', e=>{ const b=e.target.closest('button.lvl'); if(!b) return;
    level=+b.dataset.lvl; document.querySelectorAll('.lvl').forEach(x=>x.classList.toggle('on',x===b)); newQuestion(); });
  $('checkBtn').onclick=check; $('hintBtn').onclick=showHint; $('nextBtn').onclick=newQuestion;
  document.addEventListener('keydown', e=>{ if(e.key!=='Enter') return; e.preventDefault(); if(answered) newQuestion(); else check(); });

  newQuestion();
})();
</script>
</body>
</html>
