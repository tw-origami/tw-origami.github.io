<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Word Roots</title>
<style>
  :root {
    --ink: #1e293b; --muted: #64748b; --accent: #4f46e5; --accent-soft: #eef2ff;
    --correct: #16a34a; --wrong: #dc2626; --shadow: 0 10px 30px rgba(30, 41, 99, 0.12);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: linear-gradient(160deg, #eef2ff, #f8fafc); color: var(--ink);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 60px;
  }
  h1 { font-size: 26px; margin: 6px 0 2px; letter-spacing: -0.5px; }
  .sub { color: var(--muted); margin: 0 0 18px; font-size: 15px; text-align: center; max-width: 480px; }
  .nav{ display:flex; gap:8px; background:#fff; padding:5px; border-radius:12px; box-shadow:var(--shadow); margin-bottom:14px; }
  .nav a{ text-decoration:none; font-weight:800; font-size:14px; color:var(--muted); padding:8px 16px; border-radius:9px; }
  .nav a.on{ background:var(--accent); color:#fff; }

  .controls { display:flex; flex-direction:column; align-items:center; gap:12px; margin-bottom:16px; }
  .seg { display:flex; background:#fff; border-radius:14px; padding:5px; box-shadow:var(--shadow); gap:4px; flex-wrap:wrap; justify-content:center; }
  .seg button {
    border:none; background:transparent; font-family:inherit; font-weight:800;
    font-size:15px; padding:9px 18px; border-radius:10px; cursor:pointer; color:var(--muted);
    transition: background .15s, color .15s;
  }
  .seg button.on { background:var(--accent); color:#fff; }

  .scorebar { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; justify-content:center; }
  .chip { background:#fff; border-radius:999px; padding:8px 16px; font-weight:700; font-size:14px; box-shadow:var(--shadow); display:flex; align-items:center; gap:6px; }
  .chip small { color: var(--muted); font-weight:600; }
  .chip.streak { color:#ea580c; }

  .stage { width:100%; max-width:520px; display:flex; flex-direction:column; align-items:center; }

  /* ---- Flashcard ---- */
  .flash-wrap { width:100%; perspective:1400px; margin-bottom:20px; }
  .flash { position:relative; width:100%; min-height:280px; cursor:pointer; }
  .face {
    position:absolute; inset:0; background:#fff; border-radius:24px; box-shadow:var(--shadow);
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
    padding:28px; backface-visibility:hidden; transition:transform .5s cubic-bezier(.4,.2,.2,1);
  }
  .face.back { transform:rotateY(180deg); }
  .flash.flipped .face.front { transform:rotateY(180deg); }
  .flash.flipped .face.back { transform:rotateY(360deg); }
  .tagrow { display:flex; gap:8px; margin-bottom:14px; }
  .tag { font-size:12px; font-weight:800; color:var(--accent); background:var(--accent-soft); padding:4px 12px; border-radius:999px; text-transform:uppercase; letter-spacing:.4px; }
  .tag.origin { color:#b45309; background:#fef3c7; }
  .part { font-size:44px; font-weight:800; letter-spacing:-1px; margin:4px 0 8px; }
  .flip-hint { color:var(--muted); font-size:13px; margin-top:10px; }
  .meaning { font-size:26px; font-weight:800; color:var(--accent); margin:4px 0 14px; }
  .examples { color:var(--muted); font-size:15px; line-height:1.6; }
  .examples b { color:var(--ink); }

  .btn-row { display:flex; gap:12px; margin-top:4px; flex-wrap:wrap; justify-content:center; }
  button.act { font-family:inherit; font-size:16px; font-weight:700; border:none; border-radius:14px; padding:13px 22px; cursor:pointer; transition:transform .1s, background .15s; }
  button.act:active { transform:scale(.96); }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:#4338ca; }
  .btn-ghost { background:var(--accent-soft); color:var(--accent); }
  .btn-ghost:hover { background:#e0e7ff; }
  .btn-good { background:#dcfce7; color:var(--correct); }
  .btn-good:hover { background:#bbf7d0; }
  .btn-bad { background:#fee2e2; color:var(--wrong); }
  .btn-bad:hover { background:#fecaca; }

  /* ---- Quiz ---- */
  .quiz-card { width:100%; background:#fff; border-radius:24px; box-shadow:var(--shadow); padding:32px 28px; display:flex; flex-direction:column; align-items:center; }
  .qprompt { color:var(--muted); font-size:15px; margin:0 0 6px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; }
  .qpart { font-size:48px; font-weight:800; letter-spacing:-1px; margin:2px 0 26px; text-align:center; }
  .choices { display:flex; flex-direction:column; gap:12px; width:100%; }
  .choice { background:#fff; border:3px solid #e2e8f0; border-radius:16px; font-size:17px; font-weight:700; padding:16px 18px; color:var(--ink); cursor:pointer; text-align:left; }
  .choice:hover { border-color:var(--accent); background:var(--accent-soft); }
  .choice.correct { border-color:var(--correct); background:#dcfce7; color:var(--correct); }
  .choice.wrong { border-color:var(--wrong); background:#fee2e2; color:var(--wrong); }
  .choice:disabled { cursor:default; }
  .feedback { min-height:26px; margin-top:18px; font-weight:700; font-size:17px; text-align:center; }
  .feedback.good { color:var(--correct); }
  .feedback.bad { color:var(--wrong); }
  .factoid { color:var(--muted); font-size:14px; margin-top:4px; text-align:center; }

  @media (max-width:560px){ .part, .qpart { font-size:36px; } .meaning { font-size:21px; } }

  #confetti { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50; }
  .conf { position:absolute; top:-20px; width:11px; height:14px; border-radius:2px; opacity:.95; animation:fall linear forwards; }
  @keyframes fall { to { transform:translateY(105vh) rotate(720deg); opacity:1; } }
  #streakBanner {
    position:fixed; left:50%; top:22%; transform:translate(-50%,-50%) scale(.6);
    background:linear-gradient(135deg,#f59e0b,#ea580c); color:#fff; font-weight:900;
    font-size:28px; padding:20px 38px; border-radius:22px; box-shadow:0 18px 50px rgba(234,88,12,.45);
    z-index:60; opacity:0; pointer-events:none; text-align:center; white-space:nowrap;
  }
  #streakBanner.show { animation: banner 1.9s cubic-bezier(.2,.9,.3,1.3) forwards; }
  #streakBanner small { display:block; font-size:15px; font-weight:700; opacity:.9; margin-top:4px; }
  @keyframes banner {
    0%{opacity:0; transform:translate(-50%,-50%) scale(.6)}
    15%{opacity:1; transform:translate(-50%,-50%) scale(1.08)}
    28%{transform:translate(-50%,-50%) scale(1)}
    80%{opacity:1; transform:translate(-50%,-50%) scale(1)}
    100%{opacity:0; transform:translate(-50%,-60%) scale(.95)}
  }
</style>
</head>
<body>
  <div class="nav">
    <a href="../index.html">🏠 Home</a>
  </div>
  <h1>🏛️ Word Roots</h1>
  <p class="sub">Greek &amp; Latin roots, prefixes, and suffixes — the math facts of reading. Learn <b>bio</b> = life once, and unlock hundreds of words.</p>

  <div class="controls">
    <div class="seg" id="modeSeg">
      <button data-mode="flash" class="on">🔁 Flashcards</button>
      <button data-mode="quiz">🎯 Guess the Meaning</button>
    </div>
    <div class="seg" id="catSeg">
      <button data-cat="all" class="on">All</button>
      <button data-cat="prefix">Prefixes</button>
      <button data-cat="root">Roots</button>
      <button data-cat="suffix">Suffixes</button>
    </div>
  </div>

  <div id="confetti"></div>
  <div id="streakBanner"></div>

  <div class="scorebar">
    <div class="chip">✅ <span id="correctCount">0</span> <small>correct</small></div>
    <div class="chip">🎯 <span id="totalCount">0</span> <small>tried</small></div>
    <div class="chip streak">🔥 <span id="streak">0</span> <small>streak</small></div>
  </div>

  <div class="stage">
    <!-- FLASHCARD MODE -->
    <div id="flashView">
      <div class="flash-wrap">
        <div class="flash" id="flash">
          <div class="face front">
            <div class="tagrow"><span class="tag" id="frontType"></span><span class="tag origin" id="frontOrigin"></span></div>
            <div class="part" id="frontPart"></div>
            <div class="flip-hint">Tap to reveal meaning</div>
          </div>
          <div class="face back">
            <div class="tagrow"><span class="tag" id="backType"></span><span class="tag origin" id="backOrigin"></span></div>
            <div class="part" id="backPart"></div>
            <div class="meaning" id="backMeaning"></div>
            <div class="examples" id="backExamples"></div>
          </div>
        </div>
      </div>
      <div class="btn-row" id="flashKnowRow" style="display:none">
        <button class="act btn-bad" id="stillLearningBtn">🌱 Still learning</button>
        <button class="act btn-good" id="knewItBtn">💪 I knew it!</button>
      </div>
      <div class="btn-row" id="flashFlipRow">
        <button class="act btn-primary" id="flipBtn">🔄 Flip card</button>
      </div>
    </div>

    <!-- QUIZ MODE -->
    <div id="quizView" style="display:none; width:100%;">
      <div class="quiz-card">
        <p class="qprompt" id="quizTag"></p>
        <div class="qpart" id="quizPart"></div>
        <div class="choices" id="choices"></div>
        <div class="feedback" id="feedback"></div>
        <p class="factoid" id="factoid"></p>
        <div class="btn-row" id="nextRow" style="display:none">
          <button class="act btn-primary" id="nextBtn">Next word ➡️</button>
        </div>
      </div>
    </div>
  </div>

<script src="roots.js"></script>
<script>
(function(){
  const $ = id => document.getElementById(id);
  const pick = arr => arr[Math.floor(Math.random()*arr.length)];
  const shuffle = arr => arr.slice().sort(()=>Math.random()-0.5);
  const TYPE_LABEL = { prefix:'Prefix', root:'Root', suffix:'Suffix' };

  let mode = 'flash';       // 'flash' | 'quiz'
  let cat = 'all';          // 'all' | 'prefix' | 'root' | 'suffix'
  let correct = 0, total = 0, streak = 0;
  let deck = [];
  let cur = null;
  let lastPart = null;
  let flashFlipped = false;
  let quizAnswered = false;

  function pool(){
    return cat === 'all' ? window.ROOTS : window.ROOTS.filter(r => r.type === cat);
  }

  function nextItem(){
    const p = pool();
    let item, tries = 0;
    do { item = pick(p); tries++; } while (item.part === lastPart && tries < 30 && p.length > 1);
    lastPart = item.part;
    return item;
  }

  function updateScorebar(){
    $('correctCount').textContent = correct;
    $('totalCount').textContent = total;
    $('streak').textContent = streak;
  }

  // ---------- FLASHCARDS ----------
  function newFlashcard(){
    cur = nextItem();
    flashFlipped = false;
    $('flash').classList.remove('flipped');
    $('frontType').textContent = TYPE_LABEL[cur.type];
    $('frontOrigin').textContent = cur.origin;
    $('frontPart').textContent = cur.part;
    $('backType').textContent = TYPE_LABEL[cur.type];
    $('backOrigin').textContent = cur.origin;
    $('backPart').textContent = cur.part;
    $('backMeaning').textContent = '"' + cur.meaning + '"';
    $('backExamples').innerHTML = 'e.g. <b>' + cur.examples.join('</b>, <b>') + '</b>';
    $('flashKnowRow').style.display = 'none';
    $('flashFlipRow').style.display = 'flex';
  }

  function flipCard(){
    if (flashFlipped) return;
    flashFlipped = true;
    $('flash').classList.add('flipped');
    $('flashFlipRow').style.display = 'none';
    $('flashKnowRow').style.display = 'flex';
  }

  function flashResult(knew){
    total++;
    if (knew){ correct++; streak++; } else streak = 0;
    updateScorebar();
    if (knew && streak > 0 && streak % 5 === 0) celebrate(streak);
    newFlashcard();
  }

  // ---------- QUIZ ----------
  function newQuizQuestion(){
    cur = nextItem();
    quizAnswered = false;
    $('quizTag').textContent = `${TYPE_LABEL[cur.type]} · ${cur.origin}`;
    $('quizPart').textContent = cur.part;
    $('feedback').textContent = ''; $('feedback').className = 'feedback';
    $('factoid').textContent = '';
    $('nextRow').style.display = 'none';

    const p = pool().length >= 4 ? pool() : window.ROOTS;
    const wrongOpts = new Set();
    while (wrongOpts.size < 3){
      const c = pick(p);
      if (c.meaning !== cur.meaning) wrongOpts.add(c.meaning);
    }
    const opts = shuffle([cur.meaning, ...wrongOpts]);
    const box = $('choices'); box.innerHTML = '';
    opts.forEach(meaning => {
      const btn = document.createElement('button');
      btn.className = 'choice';
      btn.textContent = meaning;
      btn.onclick = () => quizAnswer(btn, meaning);
      box.appendChild(btn);
    });
  }

  function quizAnswer(btn, meaning){
    if (quizAnswered) return;
    quizAnswered = true;
    total++;
    const isCorrect = meaning === cur.meaning;
    if (isCorrect){ correct++; streak++; btn.classList.add('correct'); }
    else { streak = 0; btn.classList.add('wrong'); }
    updateScorebar();

    [...$('choices').children].forEach(c => {
      c.disabled = true;
      if (c.textContent === cur.meaning) c.classList.add('correct');
    });

    const fb = $('feedback');
    if (isCorrect){ fb.textContent = pick(['🎉 Correct!','⭐ Nice work!','✅ You got it!','🚀 Great job!']); fb.className = 'feedback good'; }
    else { fb.textContent = `"${cur.part}" means "${cur.meaning}".`; fb.className = 'feedback bad'; }
    $('factoid').innerHTML = 'e.g. <b>' + cur.examples.join('</b>, <b>') + '</b>';
    $('nextRow').style.display = 'flex';
    $('nextBtn').focus();

    if (isCorrect && streak > 0 && streak % 5 === 0) celebrate(streak);
  }

  function celebrate(n){
    const msgs = { 5:'🌟 5 in a row!', 10:'🔥 10 streak!', 15:'⚡ 15 in a row!', 20:'🏆 20 streak!' };
    const banner = $('streakBanner');
    banner.innerHTML = `${msgs[n] || '🌟 '+n+' in a row!'}<small>Keep it going!</small>`;
    banner.classList.remove('show'); void banner.offsetWidth; banner.classList.add('show');

    const colors = ['#f59e0b','#4f46e5','#16a34a','#dc2626','#0ea5e9','#ec4899'];
    const box = $('confetti');
    for (let i = 0; i < 90; i++){
      const c = document.createElement('div');
      c.className = 'conf';
      c.style.left = Math.random()*100 + 'vw';
      c.style.background = colors[i % colors.length];
      c.style.animationDuration = (1.6 + Math.random()*1.4) + 's';
      c.style.animationDelay = (Math.random()*0.4) + 's';
      c.style.transform = `rotate(${Math.random()*360}deg)`;
      box.appendChild(c);
      setTimeout(()=>c.remove(), 3400);
    }
  }

  function resetProgress(){
    correct = 0; total = 0; streak = 0; lastPart = null;
    updateScorebar();
  }

  function render(){
    $('flashView').style.display = mode === 'flash' ? '' : 'none';
    $('quizView').style.display = mode === 'quiz' ? '' : 'none';
    if (mode === 'flash') newFlashcard(); else newQuizQuestion();
  }

  $('modeSeg').addEventListener('click', e=>{
    const b = e.target.closest('button'); if(!b) return;
    mode = b.dataset.mode;
    [...$('modeSeg').children].forEach(x=>x.classList.toggle('on', x===b));
    resetProgress();
    render();
  });
  $('catSeg').addEventListener('click', e=>{
    const b = e.target.closest('button'); if(!b) return;
    cat = b.dataset.cat;
    [...$('catSeg').children].forEach(x=>x.classList.toggle('on', x===b));
    resetProgress();
    render();
  });

  $('flash').addEventListener('click', flipCard);
  $('flipBtn').onclick = flipCard;
  $('knewItBtn').onclick = () => flashResult(true);
  $('stillLearningBtn').onclick = () => flashResult(false);
  $('nextBtn').onclick = newQuizQuestion;

  document.addEventListener('keydown', e=>{
    if (e.key !== 'Enter') return;
    e.preventDefault();
    if (mode === 'flash'){
      if (!flashFlipped) flipCard();
    } else {
      if (quizAnswered) newQuizQuestion();
    }
  });

  render();
})();
</script>
</body>
</html>
