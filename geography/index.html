<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>World Explorer</title>
<style>
  :root {
    --ink: #1e293b; --muted: #64748b; --accent: #2563eb; --accent-soft: #dbeafe;
    --correct: #16a34a; --wrong: #dc2626; --shadow: 0 10px 30px rgba(30, 58, 138, 0.14);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; color: var(--ink);
    background: linear-gradient(160deg, #eff6ff, #f8fafc); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; padding: 24px 16px 60px;
  }
  h1 { font-size: 26px; margin: 6px 0 2px; letter-spacing: -0.5px; }
  .sub { color: var(--muted); margin: 0 0 18px; font-size: 15px; text-align: center; max-width: 480px; }
  /* Sticky so Home and the Countries button stay reachable no matter how tall the card grows. */
  .nav{ display:flex; gap:8px; background:#fff; padding:5px; border-radius:12px; box-shadow:var(--shadow); margin-bottom:14px; position:sticky; top:10px; z-index:70; }
  .nav a, .nav button{ text-decoration:none; font-weight:800; font-size:14px; color:var(--muted); padding:8px 16px; border-radius:9px; border:none; background:transparent; font-family:inherit; cursor:pointer; }
  .nav a.on{ background:var(--accent); color:#fff; }
  .nav button:hover{ background:var(--accent-soft); color:var(--accent); }

  .controls { display:flex; flex-direction:column; align-items:center; gap:12px; margin-bottom:16px; }
  .seg { display:flex; background:#fff; border-radius:14px; padding:5px; box-shadow:var(--shadow); gap:4px; flex-wrap:wrap; justify-content:center; }
  .seg button {
    border:none; background:transparent; font-family:inherit; font-weight:800;
    font-size:15px; padding:9px 18px; border-radius:10px; cursor:pointer; color:var(--muted);
    transition: background .15s, color .15s;
  }
  .seg button.on { background:var(--accent); color:#fff; }
  .seg.cats button { font-size:13.5px; padding:8px 13px; }

  .scorebar { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; justify-content:center; }
  .chip { background:#fff; border-radius:999px; padding:8px 16px; font-weight:700; font-size:14px; box-shadow:var(--shadow); display:flex; align-items:center; gap:6px; }
  .chip small { color: var(--muted); font-weight:600; }
  .chip.streak { color:#ea580c; }

  .stage { width:100%; max-width:540px; }
  .card { width:100%; background:#fff; border-radius:24px; box-shadow:var(--shadow); padding:28px 24px; display:flex; flex-direction:column; align-items:center; }
  .qprompt { color:var(--muted); font-size:14px; margin:0 0 16px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; text-align:center; }

  /* Match It: big item */
  .item { text-align:center; margin-bottom:24px; }
  .item .icon { font-size:66px; line-height:1; }
  .item .name { font-size:26px; font-weight:800; letter-spacing:-.3px; margin:8px 0 10px; }
  .item .cattag { display:inline-block; font-size:12px; font-weight:800; color:var(--accent); background:var(--accent-soft); padding:4px 12px; border-radius:999px; text-transform:uppercase; letter-spacing:.4px; }

  /* Guess the Country: clue list */
  .clues { width:100%; max-width:400px; margin:0 auto 24px; display:flex; flex-direction:column; gap:10px; }
  .clue { display:flex; align-items:center; gap:12px; background:#f8fafc; border:2px solid #e2e8f0; border-radius:14px; padding:12px 15px; font-size:17px; font-weight:700; }
  .clue .cicon { font-size:26px; }
  .clue .csub { display:block; font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.3px; margin-top:1px; }

  .choices { display:flex; flex-direction:column; gap:11px; width:100%; }
  .choice { background:#fff; border:3px solid #e2e8f0; border-radius:16px; font-size:17px; font-weight:700; padding:14px 18px; color:var(--ink); cursor:pointer; text-align:left; display:flex; align-items:center; gap:10px; }
  .choice .cflag { font-size:22px; }
  .choice:hover { border-color:var(--accent); background:var(--accent-soft); }
  .choice.correct { border-color:var(--correct); background:#dcfce7; color:var(--correct); }
  .choice.wrong { border-color:var(--wrong); background:#fee2e2; color:var(--wrong); }
  .choice:disabled { cursor:default; }

  .feedback { min-height:26px; margin-top:18px; font-weight:700; font-size:17px; text-align:center; }
  .feedback.good { color:var(--correct); }
  .feedback.bad { color:var(--wrong); }

  .reveal { color:var(--ink); font-size:14.5px; line-height:1.55; text-align:left; width:100%; max-width:400px; margin:8px auto 4px; padding:12px 15px; background:var(--accent-soft); border-left:3px solid var(--accent); border-radius:8px; }
  .reveal.hidden { display:none; }
  .reveal .rev-country { font-size:19px; font-weight:800; margin-bottom:5px; }
  .reveal .why { color:#1e3a8a; }

  button.act { font-family:inherit; font-size:16px; font-weight:700; border:none; border-radius:14px; padding:13px 24px; cursor:pointer; transition:transform .1s, background .15s; }
  button.act:active { transform:scale(.96); }
  button.act:disabled { opacity:.55; cursor:default; transform:none; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:#1d4ed8; }
  .btn-row { display:flex; gap:12px; margin-top:18px; flex-wrap:wrap; justify-content:center; }

  /* Reference popup */
  .modal { position:fixed; inset:0; background:rgba(15,23,42,.45); z-index:80; display:flex; align-items:center; justify-content:center; padding:18px; }
  .modal.hidden { display:none; }
  .sheet { background:#fff; border-radius:22px; box-shadow:0 24px 60px rgba(30,58,138,.35); width:100%; max-width:560px; max-height:82vh; overflow-y:auto; padding:26px 24px 30px; position:relative; }
  .sheet h2 { margin:0 0 4px; font-size:22px; letter-spacing:-.4px; }
  .sheet .sheet-sub { color:var(--muted); font-size:14px; margin:0 0 18px; }
  .closeBtn { position:sticky; float:right; top:0; width:34px; height:34px; border:none; border-radius:50%; background:var(--accent-soft); color:#1d4ed8; font-size:17px; font-weight:800; cursor:pointer; font-family:inherit; }
  .closeBtn:hover { background:var(--accent); color:#fff; }
  .crow { display:flex; align-items:baseline; gap:10px; padding:9px 0; border-top:1px solid #e2e8f0; }
  .crow:first-of-type { border-top:none; }
  .crow .cf { font-size:22px; }
  .crow .cn { font-weight:800; font-size:16px; min-width:130px; }
  .crow .cd { color:var(--muted); font-size:13.5px; }

  #confetti { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50; }
  .conf { position:absolute; top:-20px; width:11px; height:14px; border-radius:2px; opacity:.95; animation:fall linear forwards; }
  @keyframes fall { to { transform:translateY(105vh) rotate(720deg); opacity:1; } }
  #streakBanner {
    position:fixed; left:50%; top:22%; transform:translate(-50%,-50%) scale(.6);
    background:linear-gradient(135deg,#3b82f6,#2563eb); color:#fff; font-weight:900;
    font-size:28px; padding:20px 38px; border-radius:22px; box-shadow:0 18px 50px rgba(37,99,235,.45);
    z-index:60; opacity:0; pointer-events:none; text-align:center; white-space:nowrap;
  }
  #streakBanner.show { animation: banner 1.9s cubic-bezier(.2,.9,.3,1.3) forwards; }
  #streakBanner small { display:block; font-size:15px; font-weight:700; opacity:.9; margin-top:4px; }
  @keyframes banner {
    0%{opacity:0; transform:translate(-50%,-50%) scale(.6)}
    15%{opacity:1; transform:translate(-50%,-50%) scale(1.08)}
    28%{transform:translate(-50%,-50%) scale(1)}
    80%{opacity:1; transform:translate(-50%,-50%) scale(1)}
    100%{opacity:0; transform:translate(-50%,-60%) scale(.95)}
  }
</style>
</head>
<body>
  <div class="nav">
    <a href="../index.html">🏠 Home</a>
    <button id="helpBtn" title="See all the countries">🌍 Countries</button>
  </div>
  <h1>🌍 World Explorer</h1>
  <p class="sub">Explore the world by what each country gave it — art, inventions, discoveries, food, landmarks, and traditions.</p>

  <div class="controls">
    <div class="seg" id="modeSeg">
      <button data-mode="match" class="on">🧭 Match It</button>
      <button data-mode="country">🌍 Guess the Country</button>
    </div>
    <div class="seg cats" id="catSeg"></div>
  </div>

  <div id="confetti"></div>
  <div id="streakBanner"></div>

  <div class="scorebar">
    <div class="chip">✅ <span id="correctCount">0</span> <small>correct</small></div>
    <div class="chip">🎯 <span id="totalCount">0</span> <small>tried</small></div>
    <div class="chip streak">🔥 <span id="streak">0</span> <small>streak</small></div>
  </div>

  <div class="stage">
    <div class="card">
      <p class="qprompt" id="prompt"></p>
      <div id="subject"></div>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback"></div>
      <div class="reveal hidden" id="reveal"></div>
      <div class="btn-row" id="nextRow" style="display:none">
        <button class="act btn-primary" id="nextBtn">Next ➡️</button>
      </div>
    </div>
  </div>

  <div class="modal hidden" id="helpModal">
    <div class="sheet" id="helpSheet"></div>
  </div>

<script src="data.js"></script>
<script>
(function(){
  const $ = id => document.getElementById(id);
  const pick = arr => arr[Math.floor(Math.random()*arr.length)];
  const shuffle = arr => arr.slice().sort(()=>Math.random()-0.5);
  const G = window.GEO;
  const COUNTRY_NAMES = Object.keys(G.COUNTRIES);
  const flag = c => G.COUNTRIES[c].flag;

  let mode = 'match';   // 'match' | 'country'
  let cat = 'all';
  let correct = 0, total = 0, streak = 0;
  let cur = null, lastKey = null;
  let answered = false, advanceReady = true;
  let advanceTimer = null, countdownTimer = null;

  function itemPool(){
    return cat === 'all' ? G.ITEMS : G.ITEMS.filter(x => x.cat === cat);
  }

  function clearTimers(){
    if (advanceTimer){ clearTimeout(advanceTimer); advanceTimer = null; }
    if (countdownTimer){ clearInterval(countdownTimer); countdownTimer = null; }
  }

  function updateScorebar(){
    $('correctCount').textContent = correct;
    $('totalCount').textContent = total;
    $('streak').textContent = streak;
  }

  function renderCats(){
    const seg = $('catSeg'); seg.innerHTML = '';
    seg.style.display = mode === 'match' ? 'flex' : 'none';
    G.CATS.forEach(([key, label]) => {
      const b = document.createElement('button');
      b.dataset.cat = key; b.textContent = label;
      if (key === cat) b.classList.add('on');
      seg.appendChild(b);
    });
  }

  // Country distractors: 3 countries that are not `answerCountry`.
  function countryChoices(answerCountry){
    const distractors = shuffle(COUNTRY_NAMES.filter(c => c !== answerCountry)).slice(0, 3);
    return shuffle([answerCountry, ...distractors]);
  }

  function buildChoices(options, correctCountry){
    const box = $('choices'); box.innerHTML = '';
    options.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'choice';
      btn.innerHTML = `<span class="cflag">${flag(c)}</span> ${c}`;
      btn.dataset.val = c;
      btn.onclick = () => answer(btn, c, correctCountry);
      box.appendChild(btn);
    });
  }

  function newRound(){
    clearTimers();
    advanceReady = true;
    answered = false;
    $('feedback').textContent = ''; $('feedback').className = 'feedback';
    $('reveal').className = 'reveal hidden'; $('reveal').innerHTML = '';
    $('nextRow').style.display = 'none';

    if (mode === 'match'){
      const p = itemPool();
      let it, tries = 0;
      do { it = pick(p); tries++; } while (p.length > 1 && it.name === lastKey && tries < 30);
      lastKey = it.name;
      cur = it;
      $('prompt').textContent = 'Which country is this from?';
      $('subject').innerHTML =
        `<div class="item"><div class="icon">${it.icon}</div>` +
        `<div class="name">${it.name}</div>` +
        `<div class="cattag">${G.CAT_LABEL[it.cat]}</div></div>`;
      buildChoices(countryChoices(it.c), it.c);
    } else {
      // Guess the Country: pick a country, show 3 of its items as clues.
      let country, tries = 0;
      do { country = pick(COUNTRY_NAMES); tries++; } while (country === lastKey && tries < 20);
      lastKey = country;
      cur = { c: country };
      const clues = shuffle(G.ITEMS.filter(x => x.c === country)).slice(0, 3);
      $('prompt').textContent = 'Which country is famous for all of these?';
      $('subject').innerHTML =
        `<div class="clues">` + clues.map(cl =>
          `<div class="clue"><span class="cicon">${cl.icon}</span><span>${cl.name}` +
          `<span class="csub">${G.CAT_LABEL[cl.cat]}</span></span></div>`).join('') + `</div>`;
      buildChoices(countryChoices(country), country);
    }
  }

  function answer(btn, val, correctCountry){
    if (answered) return;
    answered = true;
    total++;
    const isCorrect = val === correctCountry;
    if (isCorrect){ correct++; streak++; } else streak = 0;
    updateScorebar();

    [...$('choices').children].forEach(c => {
      c.disabled = true;
      if (c.dataset.val === correctCountry) c.classList.add('correct');
    });
    if (!isCorrect) btn.classList.add('wrong');

    const fb = $('feedback');
    if (isCorrect){ fb.textContent = pick(['🎉 Correct!','⭐ Nice!','✅ You got it!','🌟 Explorer!']); fb.className = 'feedback good'; }
    else { fb.textContent = `It's ${correctCountry}.`; fb.className = 'feedback bad'; }

    const info = G.COUNTRIES[correctCountry];
    const rev = $('reveal');
    const detail = mode === 'match'
      ? cur.fact
      : `Capital: <b>${info.capital}</b> · Continent: <b>${info.continent}</b>`;
    rev.innerHTML = `<div class="rev-country">${info.flag} ${correctCountry}</div><div class="why">${detail}</div>`;
    rev.className = 'reveal';

    if (isCorrect && streak > 0 && streak % 5 === 0) celebrate(streak);

    // 3s read-lock so they actually read the fact before moving on.
    advanceReady = false;
    let secs = 3;
    const nb = $('nextBtn');
    nb.disabled = true; nb.textContent = `Read it… (${secs})`;
    $('nextRow').style.display = 'flex';
    countdownTimer = setInterval(() => {
      secs--;
      if (secs > 0) nb.textContent = `Read it… (${secs})`;
      else { clearInterval(countdownTimer); countdownTimer = null; }
    }, 1000);
    advanceTimer = setTimeout(() => {
      advanceReady = true; advanceTimer = null;
      nb.disabled = false; nb.textContent = 'Next ➡️'; nb.focus();
    }, 3000);
  }

  function tryAdvance(){ if (answered && advanceReady) newRound(); }

  function celebrate(n){
    const msgs = { 5:'🌟 5 in a row!', 10:'🔥 10 streak!', 15:'⚡ 15 in a row!', 20:'🏆 20 streak!' };
    const banner = $('streakBanner');
    banner.innerHTML = `${msgs[n] || '🌟 '+n+' in a row!'}<small>Keep exploring!</small>`;
    banner.classList.remove('show'); void banner.offsetWidth; banner.classList.add('show');

    const colors = ['#2563eb','#3b82f6','#f59e0b','#16a34a','#ec4899','#06b6d4'];
    const box = $('confetti');
    for (let i = 0; i < 90; i++){
      const c = document.createElement('div');
      c.className = 'conf';
      c.style.left = Math.random()*100 + 'vw';
      c.style.background = colors[i % colors.length];
      c.style.animationDuration = (1.6 + Math.random()*1.4) + 's';
      c.style.animationDelay = (Math.random()*0.4) + 's';
      c.style.transform = `rotate(${Math.random()*360}deg)`;
      box.appendChild(c);
      setTimeout(()=>c.remove(), 3400);
    }
  }

  function resetProgress(){ correct = 0; total = 0; streak = 0; lastKey = null; updateScorebar(); }

  // ---- "?" reference: all the countries ----
  function openHelp(){
    const rows = COUNTRY_NAMES.slice().sort().map(c => {
      const info = G.COUNTRIES[c];
      return `<div class="crow"><span class="cf">${info.flag}</span>` +
        `<span class="cn">${c}</span>` +
        `<span class="cd">${info.capital} · ${info.continent}</span></div>`;
    }).join('');
    $('helpSheet').innerHTML =
      `<button class="closeBtn" id="closeHelp" title="Close">✕</button>` +
      `<h2>🌍 Countries in this game</h2>` +
      `<p class="sheet-sub">${COUNTRY_NAMES.length} countries, their capitals, and continents.</p>` + rows;
    $('helpModal').className = 'modal';
    $('helpSheet').scrollTop = 0;
    $('closeHelp').onclick = closeHelp;
  }
  function closeHelp(){ $('helpModal').className = 'modal hidden'; }

  $('modeSeg').addEventListener('click', e => {
    const b = e.target.closest('button'); if (!b) return;
    mode = b.dataset.mode; cat = 'all';
    [...$('modeSeg').children].forEach(x => x.classList.toggle('on', x === b));
    renderCats(); resetProgress(); newRound();
  });
  $('catSeg').addEventListener('click', e => {
    const b = e.target.closest('button'); if (!b) return;
    cat = b.dataset.cat;
    [...$('catSeg').children].forEach(x => x.classList.toggle('on', x === b));
    resetProgress(); newRound();
  });
  $('nextBtn').onclick = tryAdvance;
  $('helpBtn').onclick = openHelp;
  $('helpModal').addEventListener('click', e => { if (e.target === $('helpModal')) closeHelp(); });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape'){ closeHelp(); return; }
    if (e.key !== 'Enter') return;
    e.preventDefault();
    if (!$('helpModal').className.includes('hidden')){ closeHelp(); return; }
    if (answered) tryAdvance();
  });

  renderCats();
  newRound();
})();
</script>
</body>
</html>
