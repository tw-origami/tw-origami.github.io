<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Typing Quest</title>
<style>
  :root{
    --ink:#1e293b; --muted:#64748b; --accent:#4f46e5; --accent-soft:#eef2ff;
    --correct:#16a34a; --wrong:#dc2626; --gold:#f59e0b;
    --shadow:0 10px 30px rgba(30,41,99,.12);
    /* finger colors */
    --f-pinky:#ec4899; --f-ring:#a855f7; --f-middle:#3b82f6; --f-index:#10b981; --f-thumb:#f59e0b;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; color:var(--ink);
    background:linear-gradient(160deg,#eef2ff,#f8fafc); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px 14px 50px; }
  .nav{ display:flex; gap:8px; background:#fff; padding:5px; border-radius:12px; box-shadow:var(--shadow); margin-bottom:14px; }
  .nav a,.nav button{ text-decoration:none; font-family:inherit; font-weight:800; font-size:14px; color:var(--muted); padding:8px 14px; border-radius:9px; border:none; background:transparent; cursor:pointer; }
  .nav a.on,.nav button.on{ background:var(--accent); color:#fff; }
  h1{ font-size:28px; margin:4px 0 2px; letter-spacing:-.5px; }
  .sub{ color:var(--muted); margin:0 0 18px; font-size:15px; text-align:center; }

  .menu{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; width:100%; max-width:820px; }
  .lvlcard{ text-align:left; background:#fff; border-radius:18px; box-shadow:var(--shadow); padding:20px; cursor:pointer; border:2px solid transparent; transition:transform .12s, border-color .12s; }
  .lvlcard:hover{ transform:translateY(-3px); border-color:var(--accent); }
  .lvlcard .n{ font-size:13px; font-weight:800; color:var(--accent); }
  .lvlcard h3{ margin:4px 0 4px; font-size:19px; }
  .lvlcard p{ margin:0; color:var(--muted); font-size:13px; }
  .lvlcard .keys{ margin-top:8px; font-family:ui-monospace,monospace; font-size:13px; color:var(--muted); background:var(--accent-soft); border-radius:8px; padding:4px 8px; display:inline-block; }

  .stage{ width:100%; max-width:760px; }
  .hidden{ display:none !important; }
  .card{ background:#fff; border-radius:22px; box-shadow:var(--shadow); padding:24px; }

  .stats{ display:flex; gap:10px; justify-content:center; margin-bottom:16px; flex-wrap:wrap; }
  .stat{ background:var(--accent-soft); border-radius:12px; padding:8px 16px; font-weight:800; text-align:center; min-width:78px; }
  .stat b{ display:block; font-size:22px; color:var(--accent); }
  .stat small{ color:var(--muted); font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:.5px; }

  .text{ font-family:ui-monospace,"SF Mono",Menlo,monospace; font-size:26px; line-height:1.7; letter-spacing:1px;
    background:#f8fafc; border-radius:14px; padding:20px 22px; margin-bottom:18px; word-break:break-word; }
  .text .ch{ border-radius:3px; }
  .text .done{ color:var(--correct); }
  .text .cur{ background:var(--accent); color:#fff; border-radius:4px; animation:blink 1s step-start infinite; }
  .text .err{ background:#fee2e2; color:var(--wrong); }
  .text .sp.cur{ background:var(--accent); }
  .text .sp.done{ background:transparent; }
  @keyframes blink{ 50%{ opacity:.55; } }

  /* keyboard */
  .kb{ display:flex; flex-direction:column; gap:6px; align-items:center; margin-top:6px; }
  .kbrow{ display:flex; gap:6px; }
  .key{ width:44px; height:44px; border-radius:9px; display:flex; align-items:center; justify-content:center;
    font-family:ui-monospace,monospace; font-weight:800; font-size:16px; color:#fff; opacity:.30;
    box-shadow:inset 0 -2px 0 rgba(0,0,0,.15); transition:opacity .1s, transform .06s; text-transform:uppercase; }
  .key.space{ width:280px; }
  .key.f-pinky{ background:var(--f-pinky);} .key.f-ring{ background:var(--f-ring);} .key.f-middle{ background:var(--f-middle);}
  .key.f-index{ background:var(--f-index);} .key.f-thumb{ background:var(--f-thumb);}
  .key.next{ opacity:1; transform:translateY(-3px) scale(1.06); box-shadow:0 6px 14px rgba(30,41,99,.3), inset 0 -2px 0 rgba(0,0,0,.15); outline:3px solid #fff; }
  .key .bump{ position:absolute; bottom:6px; width:10px; height:2px; background:rgba(255,255,255,.9); border-radius:2px; }
  .key{ position:relative; }
  .fingerkey{ display:flex; gap:12px; justify-content:center; margin-top:12px; flex-wrap:wrap; font-size:11px; font-weight:700; color:var(--muted); }
  .fingerkey span{ display:flex; align-items:center; gap:4px; }
  .fingerkey i{ width:12px; height:12px; border-radius:3px; display:inline-block; }

  .handguide{ margin-top:16px; text-align:center; }
  .handguide .hgcap{ font-size:13px; color:var(--muted); margin-bottom:8px; line-height:1.4; }
  .handguide svg{ width:100%; max-width:440px; height:auto; }
  .feedback{ min-height:24px; font-weight:800; font-size:17px; text-align:center; margin-top:6px; }
  .feedback.good{ color:var(--correct); }
  .center{ display:flex; gap:12px; justify-content:center; margin-top:16px; flex-wrap:wrap; }
  .btn{ font-family:inherit; font-size:16px; font-weight:800; border:none; border-radius:14px; padding:13px 22px; cursor:pointer; transition:transform .1s, background .15s; }
  .btn:active{ transform:scale(.96); }
  .btn-primary{ background:var(--accent); color:#fff; } .btn-primary:hover{ background:#4338ca; }
  .btn-ghost{ background:var(--accent-soft); color:var(--accent); }

  /* results */
  .results{ text-align:center; }
  .results .big{ font-size:56px; margin:8px 0; }
  .results .starrow{ font-size:38px; letter-spacing:6px; margin:4px 0 10px; }

  @media (max-width:640px){ .text{ font-size:20px; } .key{ width:30px; height:34px; font-size:12px; } .key.space{ width:180px; } }
</style>
</head>
<body>
  <div class="nav">
    <a href="../index.html">🏠 Home</a>
    <button id="navMenu" class="on">⌨️ Lessons</button>
  </div>
  <h1>⌨️ Typing Quest</h1>
  <p class="sub" id="subtitle">Learn to touch type — pick a lesson!</p>

  <div class="menu" id="menu"></div>
  <div class="stage hidden" id="stage"></div>

<script src="app.js?v=2"></script>
</body>
</html>
