<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Nutrition Quest</title>
<style>
  :root{
    --ink:#1e293b; --muted:#64748b; --accent:#16a34a; --accent-soft:#dcfce7;
    --accent2:#4f46e5; --accent2-soft:#eef2ff;
    --correct:#16a34a; --wrong:#dc2626; --gold:#f59e0b;
    --shadow:0 10px 30px rgba(20,60,40,.12);
  }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; color:var(--ink);
    background:linear-gradient(160deg,#ecfdf5,#eff6ff); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px 14px 60px; }
  .nav{ display:flex; gap:8px; background:#fff; padding:5px; border-radius:12px; box-shadow:var(--shadow); margin-bottom:14px; flex-wrap:wrap; justify-content:center; }
  .nav a, .nav button{ text-decoration:none; font-family:inherit; font-weight:800; font-size:14px; color:var(--muted); padding:8px 14px; border-radius:9px; border:none; background:transparent; cursor:pointer; }
  .nav a.on, .nav button.on{ background:var(--accent); color:#fff; }
  h1{ font-size:28px; margin:4px 0 2px; letter-spacing:-.5px; }
  .sub{ color:var(--muted); margin:0 0 18px; font-size:15px; text-align:center; }

  .scorebar{ display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; justify-content:center; }
  .chip{ background:#fff; border-radius:999px; padding:8px 16px; font-weight:700; font-size:14px; box-shadow:var(--shadow); display:flex; align-items:center; gap:6px; }
  .chip small{ color:var(--muted); font-weight:600; } .chip.streak{ color:#ea580c; }

  /* menu */
  .menu{ display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:18px; width:100%; max-width:820px; }
  .gamecard{ text-align:left; background:#fff; border-radius:20px; box-shadow:var(--shadow); padding:22px; cursor:pointer; border:2px solid transparent; transition:transform .12s, border-color .12s; }
  .gamecard:hover{ transform:translateY(-3px); border-color:var(--accent); }
  .gamecard .icon{ font-size:34px; }
  .gamecard h3{ margin:8px 0 4px; font-size:19px; }
  .gamecard p{ margin:0; color:var(--muted); font-size:14px; line-height:1.4; }

  .stage{ width:100%; max-width:820px; }
  .hidden{ display:none !important; }

  .card{ background:#fff; border-radius:22px; box-shadow:var(--shadow); padding:24px; }
  .prompt{ font-size:22px; font-weight:800; text-align:center; margin:0 0 6px; line-height:1.35; }
  .promptsub{ text-align:center; color:var(--muted); font-size:14px; margin:0 0 18px; }
  .feedback{ min-height:26px; margin-top:14px; font-weight:800; font-size:17px; text-align:center; }
  .feedback.good{ color:var(--correct); } .feedback.bad{ color:var(--wrong); }
  .why{ text-align:center; color:var(--muted); font-size:14px; margin-top:6px; min-height:20px; }

  .btn{ font-family:inherit; font-size:16px; font-weight:800; border:none; border-radius:14px; padding:13px 22px; cursor:pointer; transition:transform .1s, background .15s; }
  .btn:active{ transform:scale(.96); }
  .btn-primary{ background:var(--accent); color:#fff; } .btn-primary:hover{ background:#15803d; }
  .btn-ghost{ background:var(--accent-soft); color:var(--accent); }
  .center{ display:flex; gap:12px; justify-content:center; margin-top:18px; flex-wrap:wrap; }

  /* tiles (options, choices) */
  .tiles{ display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; }
  .tile{ background:#fff; border:3px solid #e2e8f0; border-radius:16px; padding:16px 10px; font-weight:800; font-size:17px; cursor:pointer; text-align:center; transition:border-color .12s, background .12s, transform .1s; }
  .tile:active{ transform:scale(.97); }
  .tile .em{ font-size:30px; display:block; margin-bottom:6px; }
  .tile.sel{ border-color:var(--accent2); background:var(--accent2-soft); }
  .tile.correct{ border-color:var(--correct); background:var(--accent-soft); color:var(--correct); }
  .tile.wrong{ border-color:var(--wrong); background:#fee2e2; color:var(--wrong); }
  .tile[disabled]{ opacity:.55; cursor:default; }

  /* matching columns */
  .matchwrap{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .col{ display:flex; flex-direction:column; gap:10px; }
  .colhead{ text-align:center; font-weight:800; color:var(--muted); font-size:13px; text-transform:uppercase; letter-spacing:.5px; }
  .mitem{ background:#fff; border:3px solid #e2e8f0; border-radius:14px; padding:13px 10px; font-weight:800; font-size:15px; cursor:pointer; text-align:center; transition:all .12s; }
  .mitem .em{ font-size:22px; margin-right:4px; }
  .mitem.sel{ border-color:var(--accent2); background:var(--accent2-soft); }
  .mitem.done{ border-color:var(--correct); background:var(--accent-soft); color:var(--correct); cursor:default; }
  .mitem.badflash{ border-color:var(--wrong); background:#fee2e2; }

  /* nutrition label */
  .label{ border:3px solid #1e293b; border-radius:8px; max-width:320px; margin:0 auto 16px; padding:10px 12px; font-family:"Helvetica Neue",Arial,sans-serif; }
  .label .lt{ font-size:26px; font-weight:900; border-bottom:8px solid #1e293b; padding-bottom:2px; }
  .label .row{ display:flex; justify-content:space-between; border-bottom:1px solid #cbd5e1; padding:3px 0; font-size:14px; }
  .label .row.big{ border-bottom:5px solid #1e293b; font-weight:800; }
  .label .sug{ font-weight:800; }
  .ingredients{ max-width:360px; margin:0 auto 12px; font-size:13px; color:var(--ink); background:#f8fafc; border-radius:10px; padding:10px 12px; }
  .ingredients b{ text-transform:uppercase; font-size:11px; color:var(--muted); letter-spacing:.5px; }
  .ingredients .sugword{ background:#fecaca; border-radius:4px; padding:0 3px; font-weight:800; }

  /* plate */
  .plate-area{ display:flex; gap:20px; flex-wrap:wrap; justify-content:center; }
  .plate{ width:260px; height:260px; border-radius:50%; background:#fff; border:8px solid #cbd5e1; position:relative; overflow:hidden; flex:0 0 auto; box-shadow:var(--shadow); display:flex; flex-wrap:wrap; align-content:flex-start; gap:2px; padding:14px; }
  .plate .pf{ font-size:24px; }
  .plate .empty{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#94a3b8; font-weight:700; font-size:14px; text-align:center; padding:20px; }
  .plate.meal{ align-content:center; justify-content:center; gap:10px; }
  .plate .slot{ width:48px; height:48px; border:3px dashed #94a3b8; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:900; color:#94a3b8; }
  .plate .slot.filled{ border-style:solid; border-color:var(--accent); background:var(--accent-soft); color:inherit; }
  .tray{ flex:1; min-width:240px; }
  .traygrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(64px,1fr)); gap:8px; max-height:300px; overflow:auto; }
  .food{ background:#fff; border:2px solid #e2e8f0; border-radius:12px; padding:8px 4px; text-align:center; cursor:pointer; font-size:11px; font-weight:700; }
  .food:hover{ border-color:var(--accent); }
  .food .em{ font-size:24px; display:block; }
  .bars{ margin-top:10px; }
  .barrow{ display:flex; align-items:center; gap:8px; font-size:13px; font-weight:700; margin:4px 0; }
  .barrow .lbl{ width:80px; text-transform:capitalize; }
  .barrow .track{ flex:1; height:14px; background:#eef2f7; border-radius:999px; overflow:hidden; position:relative; }
  .barrow .fill{ height:100%; border-radius:999px; background:var(--accent); transition:width .3s; }
  .barrow .tgt{ position:absolute; top:-3px; width:2px; height:20px; background:#334155; }

  /* nutrient reveal facts */
  .nutfacts{ margin-top:16px; display:flex; flex-direction:column; gap:8px; text-align:left; }
  .nutfacts .intro{ font-weight:800; font-size:15px; margin-bottom:2px; }
  .nutfact{ border-radius:12px; padding:10px 12px; font-size:14px; line-height:1.4; display:flex; align-items:center; gap:10px; }
  .nutfact.exc{ background:var(--accent-soft); border:2px solid var(--accent); }
  .nutfact.low{ background:#f1f5f9; border:2px solid #e2e8f0; color:#475569; }
  .nutfact .pct{ flex:0 0 auto; font-weight:900; font-size:13px; border-radius:999px; padding:5px 10px; white-space:nowrap; }
  .nutfact.exc .pct{ background:var(--accent); color:#fff; }
  .nutfact.low .pct{ background:#cbd5e1; color:#334155; }
  .nutfact .nn{ font-weight:800; color:var(--accent2); }
  .nutfact.exc .nn{ color:#15803d; }
  .nutfacts .keynote{ font-size:12px; color:var(--muted); margin-top:4px; }
  .nutfact .daily{ font-weight:600; color:var(--muted); font-size:13px; }
  .dailybox{ max-width:360px; margin:0 auto 14px; background:#fefce8; border:2px solid #fde68a; border-radius:12px; padding:10px 12px; font-size:13px; line-height:1.45; }
  .dailybox .gt{ display:block; margin-bottom:4px; font-size:14px; }
  .dailybox .gr{ margin:3px 0; }

  /* streak celebration */
  #confetti{ position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50; }
  .conf{ position:absolute; top:-20px; width:11px; height:14px; border-radius:2px; animation:fall linear forwards; }
  @keyframes fall{ to{ transform:translateY(105vh) rotate(720deg); } }
</style>
</head>
<body>
  <div id="confetti"></div>

  <div class="nav">
    <a href="../index.html">🏠 Home</a>
    <button id="navMenu" class="on">🍎 Menu</button>
  </div>
  <h1>🍎 Nutrition Quest</h1>
  <p class="sub" id="subtitle">Pick a game to start!</p>

  <div class="scorebar" id="scorebar" style="display:none">
    <div class="chip">✅ <span id="correctCount">0</span> <small>correct</small></div>
    <div class="chip streak">🔥 <span id="streak">0</span> <small>streak</small></div>
  </div>

  <!-- MENU -->
  <div class="menu" id="menu">
    <button class="gamecard" data-game="match"><span class="icon">🔗</span><h3>What's Inside?</h3><p>Pick every nutrient a food has, then learn what each one does for your body — and how much the food packs.</p></button>
    <button class="gamecard" data-game="fuel"><span class="icon">⚡</span><h3>Best Fuel</h3><p>Pick the best food for the situation — and learn <em>why</em> it's the smart choice.</p></button>
    <button class="gamecard" data-game="label"><span class="icon">🏷️</span><h3>Label Reader</h3><p>Read real nutrition labels: serving size, servings per box, and spot the hidden sugar.</p></button>
    <button class="gamecard" data-game="plate"><span class="icon">🍽️</span><h3>Complete the Meal</h3><p>A plate is missing a nutrient. Pick the food that adds the iron, calcium, or protein it needs!</p></button>
    <button class="gamecard" data-game="swap"><span class="icon">🔀</span><h3>Healthier Swap</h3><p>Fast rounds: tap the better choice before the clock runs out.</p></button>
  </div>

  <!-- GAME STAGE -->
  <div class="stage hidden" id="stage"></div>

<script src="library.js?v=3"></script>
<script src="app.js?v=3"></script>
</body>
</html>
