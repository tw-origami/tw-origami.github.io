<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Math Practice</title>
<style>
  :root {
    --bg: #f0f4ff;
    --panel: #ffffff;
    --ink: #1e293b;
    --muted: #64748b;
    --accent: #4f46e5;
    --accent-soft: #eef2ff;
    --correct: #16a34a;
    --wrong: #dc2626;
    --shadow: 0 10px 30px rgba(30, 41, 99, 0.12);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: linear-gradient(160deg, #eef2ff, #f8fafc);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
  }
  h1 { font-size: 26px; margin: 6px 0 2px; letter-spacing: -0.5px; }
  .sub { color: var(--muted); margin: 0 0 18px; font-size: 15px; }
  .nav{ display:flex; gap:8px; background:#fff; padding:5px; border-radius:12px; box-shadow:var(--shadow); margin-bottom:14px; }
  .nav a{ text-decoration:none; font-weight:800; font-size:14px; color:var(--muted); padding:8px 16px; border-radius:9px; }
  .nav a.on{ background:var(--accent); color:#fff; }

  /* Controls: mode + level */
  .controls { display:flex; flex-direction:column; align-items:center; gap:12px; margin-bottom:16px; }
  .seg { display:flex; background:var(--panel); border-radius:14px; padding:5px; box-shadow:var(--shadow); gap:4px; }
  .seg button {
    border:none; background:transparent; font-family:inherit; font-weight:800;
    font-size:16px; padding:10px 20px; border-radius:10px; cursor:pointer; color:var(--muted);
    transition: background .15s, color .15s;
  }
  .seg button.on { background:var(--accent); color:#fff; }
  .levels { display:flex; gap:8px; align-items:center; }
  .levels .lbl { font-size:13px; color:var(--muted); font-weight:700; margin-right:2px; }
  .lvl {
    width:42px; height:42px; border:none; border-radius:12px; font-weight:800; font-size:17px;
    cursor:pointer; background:var(--panel); color:var(--muted); box-shadow:var(--shadow);
    transition: transform .1s, background .15s, color .15s;
  }
  .lvl:active { transform:scale(.94); }
  .lvl.on { background:var(--accent); color:#fff; }

  .scorebar { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; justify-content:center; }
  .chip {
    background: var(--panel); border-radius:999px; padding:8px 16px; font-weight:700;
    font-size:14px; box-shadow:var(--shadow); display:flex; align-items:center; gap:6px;
  }
  .chip small { color: var(--muted); font-weight:600; }
  .chip.streak { color:#ea580c; }

  .layout { display:flex; gap:24px; width:100%; max-width:1000px; align-items:stretch; flex-wrap:wrap; }
  .card { background:var(--panel); border-radius:24px; box-shadow:var(--shadow); padding:28px; }

  .quiz { flex:1 1 340px; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:420px; }
  .question { font-size:64px; font-weight:800; letter-spacing:-2px; margin:4px 0 24px; text-align:center; }
  .question .op { color:var(--accent); }

  .answer-input {
    font-size:44px; font-weight:800; text-align:center; width:220px; padding:12px;
    border:3px solid #e2e8f0; border-radius:18px; outline:none;
    transition:border-color .15s, box-shadow .15s; color:var(--ink); -moz-appearance:textfield;
  }
  .answer-input::-webkit-outer-spin-button, .answer-input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
  .answer-input:focus { border-color:var(--accent); box-shadow:0 0 0 4px var(--accent-soft); }
  .answer-input.correct { border-color:var(--correct); box-shadow:0 0 0 4px #dcfce7; }
  .answer-input.wrong { border-color:var(--wrong); box-shadow:0 0 0 4px #fee2e2; animation:shake .4s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 50%{transform:translateX(8px)} 75%{transform:translateX(-5px)} }

  .btn-row { display:flex; gap:12px; margin-top:22px; flex-wrap:wrap; justify-content:center; }
  button.act { font-family:inherit; font-size:17px; font-weight:700; border:none; border-radius:14px; padding:14px 24px; cursor:pointer; transition:transform .1s, background .15s; }
  button.act:active { transform:scale(.96); }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:#4338ca; }
  .btn-ghost { background:var(--accent-soft); color:var(--accent); }
  .btn-ghost:hover { background:#e0e7ff; }

  .choices { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:22px; width:100%; max-width:320px; }
  .choices.hidden { display:none; }
  .choice { background:#fff; border:3px solid #e2e8f0; border-radius:16px; font-size:28px; font-weight:800; padding:16px 0; color:var(--ink); cursor:pointer; }
  .choice:hover { border-color:var(--accent); background:var(--accent-soft); }
  .choice.correct { border-color:var(--correct); background:#dcfce7; color:var(--correct); }
  .choice.wrong { border-color:var(--wrong); background:#fee2e2; color:var(--wrong); }

  .feedback { min-height:26px; margin-top:16px; font-weight:700; font-size:18px; text-align:center; }
  .feedback.good { color:var(--correct); }
  .feedback.bad { color:var(--wrong); }

  /* Visual — hidden until answer is won, then pops up */
  .visual { flex:1 1 380px; display:flex; flex-direction:column; }
  .visual.hidden { display:none; }
  .pop { animation: pop .45s cubic-bezier(.2,.9,.3,1.3); }
  @keyframes pop { 0%{transform:scale(.85) translateY(14px); opacity:0} 100%{transform:scale(1) translateY(0); opacity:1} }
  .visual h2 { margin:0 0 4px; font-size:20px; }
  .visual .hint-txt { color:var(--muted); font-size:14px; margin:0 0 18px; }

  .strip { display:flex; flex-direction:column; gap:9px; }
  .rung { display:flex; align-items:center; gap:10px; padding:5px 10px; border-radius:12px; }
  .rung .label { flex:0 0 105px; align-self:center; text-align:right; font-size:15px; font-weight:700; color:var(--muted); white-space:nowrap; }
  .rung.active { align-items:center; }
  .rung .label b { color:var(--ink); }
  .rung .label .eq { color:var(--ink); font-weight:800; font-size:17px; }
  .blocks { display:flex; gap:8px; flex-wrap:wrap; }     /* gap between GROUPS; wraps to fit */
  .grp { display:flex; gap:3px; }                        /* gap between units in a group */
  .blk {
    width:var(--u,26px); height:var(--u,26px); border-radius:5px;
    background:var(--bc,#4f46e5);
    box-shadow: inset 0 0 0 2px rgba(255,255,255,.35);
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:800; font-size:calc(var(--u,26px) * .48);
    text-shadow:0 1px 2px rgba(0,0,0,.3);
  }
  .rung.active { background:var(--accent-soft); outline:3px solid var(--accent); }
  .rung.active .label, .rung.active .label .eq { color:var(--accent); }
  .rung.active .label b { color:var(--accent); }
  .rung.dim { opacity:.45; }

  @media (max-width:720px){ .question{font-size:48px} .quiz{min-height:auto} }

  /* Streak celebration */
  #confetti { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50; }
  .conf { position:absolute; top:-20px; width:11px; height:14px; border-radius:2px; opacity:.95; animation:fall linear forwards; }
  @keyframes fall { to { transform:translateY(105vh) rotate(720deg); opacity:1; } }
  #streakBanner {
    position:fixed; left:50%; top:22%; transform:translate(-50%,-50%) scale(.6);
    background:linear-gradient(135deg,#f59e0b,#ea580c); color:#fff; font-weight:900;
    font-size:30px; padding:20px 38px; border-radius:22px; box-shadow:0 18px 50px rgba(234,88,12,.45);
    z-index:60; opacity:0; pointer-events:none; text-align:center; white-space:nowrap;
  }
  #streakBanner.show { animation: banner 1.9s cubic-bezier(.2,.9,.3,1.3) forwards; }
  #streakBanner small { display:block; font-size:15px; font-weight:700; opacity:.9; margin-top:4px; }
  @keyframes banner {
    0%{opacity:0; transform:translate(-50%,-50%) scale(.6)}
    15%{opacity:1; transform:translate(-50%,-50%) scale(1.08)}
    28%{transform:translate(-50%,-50%) scale(1)}
    80%{opacity:1; transform:translate(-50%,-50%) scale(1)}
    100%{opacity:0; transform:translate(-50%,-60%) scale(.95)}
  }
</style>
</head>
<body>
  <div class="nav">
    <a href="index.html" class="on">📊 Blocks</a>
    <a href="chart.html">🔢 Chart</a>
    <a href="addsub.html">➕ Add &amp; Subtract</a>
  </div>
  <h1>🧮 Math Practice</h1>
  <p class="sub">Type the answer, or tap <b>Hint</b> for choices.</p>

  <div class="controls">
    <div class="seg" id="modeSeg">
      <button data-mode="mul" class="on">✖️ Multiply</button>
      <button data-mode="div">➗ Divide</button>
    </div>
    <div class="levels" id="levelSeg">
      <span class="lbl">Level</span>
      <button class="lvl on" data-lvl="1">1</button>
      <button class="lvl" data-lvl="2">2</button>
      <button class="lvl" data-lvl="3">3</button>
      <button class="lvl" data-lvl="4">4</button>
      <button class="lvl" data-lvl="5">5</button>
    </div>
  </div>

  <div id="confetti"></div>
  <div id="streakBanner"></div>

  <div class="scorebar">
    <div class="chip">✅ <span id="correctCount">0</span> <small>correct</small></div>
    <div class="chip">🎯 <span id="totalCount">0</span> <small>tried</small></div>
    <div class="chip streak">🔥 <span id="streak">0</span> <small>streak</small></div>
  </div>

  <div class="layout">
    <!-- QUIZ -->
    <div class="card quiz">
      <div class="question" id="question"></div>
      <input class="answer-input" id="answer" type="number" inputmode="numeric" placeholder="?" autocomplete="off">
      <div class="btn-row">
        <button class="act btn-primary" id="checkBtn">Check</button>
        <button class="act btn-ghost" id="hintBtn">💡 Hint</button>
      </div>
      <div class="choices hidden" id="choices"></div>
      <div class="feedback" id="feedback"></div>
      <div class="btn-row" id="nextRow" style="display:none">
        <button class="act btn-primary" id="nextBtn">Next question ➡️</button>
      </div>
    </div>

    <!-- VISUAL (hidden until answered) -->
    <div class="card visual hidden" id="visualCard">
      <h2 id="visualTitle"></h2>
      <p class="hint-txt" id="visualHint"></p>
      <div class="strip" id="strip"></div>
    </div>
  </div>

<script>
(function(){
  const $ = id => document.getElementById(id);
  const rand = (lo, hi) => Math.floor(Math.random()*(hi-lo+1))+lo;
  const pick = arr => arr[Math.floor(Math.random()*arr.length)];
  const STRIP_MAX = 12;

  // Level -> factor range. L1 easy (1x2, 3x3) ... L5 hard (12x9)
  const LEVELS = {
    1: [1, 3],
    2: [2, 5],
    3: [4, 9],
    4: [6, 10],
    5: [8, 12]
  };

  let mode = 'mul';     // 'mul' | 'div'
  let level = 1;
  let P = null;         // current problem
  let answered, correct = 0, total = 0, streak = 0;

  // Blue gradient: dark (small) -> light (large)
  const shade = (step, steps) => `hsl(222, 78%, ${40 + (step/steps)*45}%)`;

  function makeProblem(){
    const [lo, hi] = LEVELS[level];
    const x = rand(lo, hi), y = rand(lo, hi);
    if (mode === 'mul'){
      // a × b : count by a, highlight b
      return { display: `${x} <span class="op">×</span> ${y}`,
               answer: x*y, base: x, target: y, product: x*y, step: x, verb: 'jump' };
    } else {
      // (x*y) ÷ x = y : count by x (divisor), highlight y (quotient)
      return { display: `${x*y} <span class="op">÷</span> ${x}`,
               answer: y, base: x, target: y, product: x*y, step: 1, verb: 'group' };
    }
  }

  function newQuestion(){
    P = makeProblem();
    answered = false;
    $('question').innerHTML = P.display;
    const inp = $('answer');
    inp.value = ''; inp.className = 'answer-input'; inp.disabled = false;
    $('feedback').textContent = ''; $('feedback').className = 'feedback';
    $('choices').className = 'choices hidden'; $('choices').innerHTML = '';
    $('nextRow').style.display = 'none';
    $('hintBtn').style.display = ''; $('checkBtn').style.display = '';
    $('visualCard').className = 'card visual hidden';   // hide until won
    inp.focus();
  }

  function buildStrip(){
    const strip = $('strip'); strip.innerHTML = '';
    const countWord = mode === 'mul' ? 'Counting' : 'Grouping';
    $('visualTitle').textContent = `${countWord} by ${P.base}`;
    if (mode === 'mul'){
      $('visualHint').innerHTML = `<b>${P.base} × ${P.target} = ${P.product}</b> — that's ${P.target} jump${P.target>1?'s':''} of ${P.base}.`;
    } else {
      $('visualHint').innerHTML = `<b>${P.product} ÷ ${P.base} = ${P.target}</b> — ${P.product} splits into ${P.target} group${P.target>1?'s':''} of ${P.base}.`;
    }
    const stripW = strip.clientWidth || 460;
    const avail = stripW - 130;               // space left of blocks for the label
    const maxUnits = P.base * STRIP_MAX;
    // Small blocks for the counting rows: aim to fit the longest row in ~1-2 lines.
    const smallUnit = Math.max(9, Math.min(16, Math.floor((avail * 1.9) / maxUnits) - 3));
    // Big, numbered blocks for the answer row: keep them readable (>=22px) and
    // let the row wrap to more lines rather than shrinking the numbers.
    const bigUnit = Math.max(22, Math.min(30, Math.floor(avail / Math.max(P.base * P.target, 1)) - 3));
    for (let i = 1; i <= STRIP_MAX; i++){
      const val = P.base * i;
      const rung = document.createElement('div');
      rung.className = 'rung';
      const numbered = (i === P.target);        // only the answer row is numbered + big
      if (numbered) rung.classList.add('active');
      else if (i > P.target) rung.classList.add('dim');
      const unit = numbered ? bigUnit : smallUnit;
      let blocks = '', n = 0;
      for (let g = 0; g < i; g++){
        let grp = '';
        for (let u = 0; u < P.base; u++){ n++; grp += `<span class="blk">${numbered ? n : ''}</span>`; }
        blocks += `<span class="grp">${grp}</span>`;
      }
      rung.innerHTML = `
        <div class="label">${P.base} × <b>${i}</b> = <span class="eq">${val}</span></div>
        <div class="blocks" style="--u:${unit}px; --bc:${shade(i,STRIP_MAX)}">${blocks}</div>`;
      strip.appendChild(rung);
    }
  }

  function finish(isCorrect){
    answered = true;
    total++;
    if (isCorrect){ correct++; streak++; } else streak = 0;
    $('correctCount').textContent = correct;
    $('totalCount').textContent = total;
    $('streak').textContent = streak;

    const fb = $('feedback');
    if (isCorrect){ fb.textContent = pick(['🎉 Correct!','⭐ Nice work!','✅ You got it!','🚀 Great job!']); fb.className = 'feedback good'; }
    else { fb.textContent = `The answer is ${P.answer}.`; fb.className = 'feedback bad'; }

    $('answer').disabled = true;
    $('hintBtn').style.display = 'none';
    $('checkBtn').style.display = 'none';
    $('nextRow').style.display = 'flex';
    $('nextBtn').focus();

    // Pop up the visual now that the answer is won
    const vc = $('visualCard');
    vc.className = 'card visual pop';
    buildStrip();
    vc.scrollIntoView({behavior:'smooth', block:'nearest'});

    // Reward every 5 in a row
    if (isCorrect && streak > 0 && streak % 5 === 0) celebrate(streak);
  }

  function celebrate(n){
    const msgs = { 5:'🌟 5 in a row!', 10:'🔥 10 streak!', 15:'⚡ 15 in a row!', 20:'🏆 20 streak!' };
    const banner = $('streakBanner');
    banner.innerHTML = `${msgs[n] || '🌟 '+n+' in a row!'}<small>Keep it going!</small>`;
    banner.classList.remove('show'); void banner.offsetWidth; banner.classList.add('show');

    const colors = ['#f59e0b','#4f46e5','#16a34a','#dc2626','#0ea5e9','#ec4899'];
    const box = $('confetti');
    for (let i = 0; i < 90; i++){
      const c = document.createElement('div');
      c.className = 'conf';
      c.style.left = Math.random()*100 + 'vw';
      c.style.background = colors[i % colors.length];
      c.style.animationDuration = (1.6 + Math.random()*1.4) + 's';
      c.style.animationDelay = (Math.random()*0.4) + 's';
      c.style.transform = `rotate(${Math.random()*360}deg)`;
      box.appendChild(c);
      setTimeout(()=>c.remove(), 3400);
    }
  }

  function check(){
    if (answered) return;
    const inp = $('answer');
    const val = parseInt(inp.value, 10);
    if (isNaN(val)){ inp.focus(); return; }
    if (val === P.answer){ inp.className = 'answer-input correct'; finish(true); }
    else {
      inp.className = 'answer-input wrong';
      streak = 0; $('streak').textContent = streak;
      $('feedback').textContent = 'Not quite — try again or tap 💡 Hint.';
      $('feedback').className = 'feedback bad';
      setTimeout(()=>{ if(!answered){ inp.className='answer-input'; inp.select(); } }, 500);
    }
  }

  function showHint(){
    if (answered) return;
    const box = $('choices');
    if (box.childElementCount){ box.className = 'choices'; return; }
    const ans = P.answer;
    const opts = new Set([ans]);
    while (opts.size < 4){
      const k = rand(1,3) * (Math.random()<.5 ? -1 : 1);
      let cand = ans + k*P.step;
      if (cand < 1) cand = ans + Math.abs(k)*P.step;
      opts.add(cand);
    }
    const shuffled = [...opts].sort(()=>Math.random()-0.5);
    box.className = 'choices'; box.innerHTML = '';
    shuffled.forEach(v=>{
      const btn = document.createElement('button');
      btn.className = 'choice'; btn.textContent = v;
      btn.onclick = ()=>{
        if (answered) return;
        if (v === ans){ btn.classList.add('correct'); finish(true); }
        else { btn.classList.add('wrong'); btn.disabled = true; streak = 0; $('streak').textContent = streak; }
      };
      box.appendChild(btn);
    });
  }

  // Controls
  $('modeSeg').addEventListener('click', e=>{
    const b = e.target.closest('button'); if(!b) return;
    mode = b.dataset.mode;
    [...$('modeSeg').children].forEach(x=>x.classList.toggle('on', x===b));
    newQuestion();
  });
  $('levelSeg').addEventListener('click', e=>{
    const b = e.target.closest('button.lvl'); if(!b) return;
    level = +b.dataset.lvl;
    [...document.querySelectorAll('.lvl')].forEach(x=>x.classList.toggle('on', x===b));
    newQuestion();
  });

  $('checkBtn').onclick = check;
  $('hintBtn').onclick  = showHint;
  $('nextBtn').onclick  = newQuestion;
  // Enter submits the answer; once answered, Enter goes to the next question.
  document.addEventListener('keydown', e=>{
    if (e.key !== 'Enter') return;
    e.preventDefault();
    if (answered) newQuestion();
    else check();
  });

  newQuestion();
})();
</script>
</body>
</html>
