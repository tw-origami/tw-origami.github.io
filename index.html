<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>The Learn Zone</title>
<style>
  :root{
    --ink:#1e293b; --muted:#64748b; --accent:#4f46e5; --accent-soft:#eef2ff;
    --shadow:0 10px 30px rgba(30,41,99,.12);
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; color:var(--ink);
    background:linear-gradient(160deg,#eef2ff,#f8fafc); min-height:100vh;
    display:flex; flex-direction:column; align-items:center; padding:48px 18px 60px;
  }
  header{ text-align:center; margin-bottom:36px; }
  h1{ font-size:38px; margin:0 0 6px; letter-spacing:-1px; }
  .tagline{ color:var(--muted); font-size:17px; margin:0; }

  .grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:20px; width:100%; max-width:900px;
  }
  .app{
    display:flex; flex-direction:column; text-decoration:none; color:inherit;
    background:#fff; border-radius:22px; box-shadow:var(--shadow); padding:26px;
    transition:transform .15s, box-shadow .15s; border:2px solid transparent;
  }
  .app:hover{ transform:translateY(-4px); box-shadow:0 18px 40px rgba(30,41,99,.18); border-color:var(--accent); }
  .app .icon{
    width:64px; height:64px; border-radius:16px; display:flex; align-items:center; justify-content:center;
    font-size:34px; margin-bottom:16px; background:var(--accent-soft);
  }
  .app h2{ margin:0 0 6px; font-size:22px; }
  .app p{ margin:0 0 14px; color:var(--muted); font-size:15px; line-height:1.4; flex:1; }
  .app .tags{ display:flex; gap:6px; flex-wrap:wrap; }
  .tag{ font-size:12px; font-weight:700; color:var(--accent); background:var(--accent-soft); padding:4px 10px; border-radius:999px; }
  .app .go{ margin-top:16px; font-weight:800; color:var(--accent); font-size:15px; }

  /* placeholder card for future apps */
  .app.soon{ background:transparent; box-shadow:none; border:2px dashed #c7d2fe; cursor:default; align-items:center; justify-content:center; text-align:center; color:var(--muted); }
  .app.soon:hover{ transform:none; border-color:#c7d2fe; box-shadow:none; }
  .app.soon .icon{ background:#eef2ff; }

  footer{ margin-top:44px; color:var(--muted); font-size:13px; text-align:center; }
</style>
</head>
<body>
  <header>
    <h1>🚀 The Learn Zone</h1>
    <p class="tagline">A little collection of things I've built.</p>
  </header>

  <div class="grid">
    <!-- MATH APP -->
    <a class="app" href="math/index.html">
      <div class="icon">🧮</div>
      <h2>Math Practice</h2>
      <p>Practice multiplication, division, addition &amp; subtraction with visual helpers, hints, levels, and streaks.</p>
      <div class="tags">
        <span class="tag">Blocks</span>
        <span class="tag">Chart</span>
        <span class="tag">Add &amp; Subtract</span>
      </div>
      <div class="go">Open →</div>
    </a>

    <!-- Placeholder for future apps -->
    <div class="app soon">
      <div class="icon">✨</div>
      <h2>More coming</h2>
      <p>New apps will show up here.</p>
    </div>
  </div>

  <footer>Made with ❤️</footer>
</body>
</html>
