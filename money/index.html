<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Money Smarts</title>
<style>
  :root{
    --ink:#14311f; --muted:#5c7266; --accent:#16a34a; --accent-soft:#dcfce7;
    --gold:#f59e0b; --correct:#16a34a; --wrong:#dc2626;
    --shadow:0 10px 30px rgba(20,80,40,.13);
  }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; color:var(--ink);
    background:linear-gradient(160deg,#f0fdf4,#eef7f2); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px 14px 60px; }
  .nav{ display:flex; gap:8px; background:#fff; padding:5px; border-radius:12px; box-shadow:var(--shadow); margin-bottom:14px; }
  .nav a,.nav button{ text-decoration:none; font-family:inherit; font-weight:800; font-size:14px; color:var(--muted); padding:8px 14px; border-radius:9px; border:none; background:transparent; cursor:pointer; }
  .nav a.on,.nav button.on{ background:var(--accent); color:#fff; }
  h1{ font-size:28px; margin:4px 0 2px; letter-spacing:-.5px; }
  .sub{ color:var(--muted); margin:0 0 16px; font-size:15px; text-align:center; max-width:520px; }

  .scorebar{ display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; justify-content:center; }
  .chip{ background:#fff; border-radius:999px; padding:8px 16px; font-weight:800; font-size:14px; box-shadow:var(--shadow); }
  .chip small{ color:var(--muted); font-weight:600; } .chip.streak{ color:#ea580c; }

  .menu{ display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:18px; width:100%; max-width:820px; }
  .gcard{ text-align:left; background:#fff; border-radius:20px; box-shadow:var(--shadow); padding:22px; cursor:pointer; border:2px solid transparent; transition:transform .12s, border-color .12s; }
  .gcard:hover{ transform:translateY(-3px); border-color:var(--accent); }
  .gcard .icon{ font-size:34px; }
  .gcard h3{ margin:8px 0 4px; font-size:19px; }
  .gcard p{ margin:0; color:var(--muted); font-size:14px; line-height:1.4; }

  .stage{ width:100%; max-width:600px; }
  .hidden{ display:none !important; }
  .card{ background:#fff; border-radius:22px; box-shadow:var(--shadow); padding:22px; }

  .gtitle{ display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:6px; }
  .gtitle .pill{ background:var(--accent-soft); color:#15803d; border-radius:999px; padding:7px 14px; font-weight:800; font-size:13px; }
  .prompt{ font-size:20px; font-weight:800; text-align:center; margin:6px 0 4px; line-height:1.35; }
  .teach{ color:var(--muted); font-size:13.5px; line-height:1.55; text-align:center; margin:0 auto 14px; max-width:460px; }

  .tokens{ display:flex; flex-wrap:wrap; gap:10px; justify-content:center; background:#f7fbf8; border:2px solid #e3efe8; border-radius:16px; padding:18px; margin:8px 0 16px; min-height:70px; }
  .coin{ border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; color:#3a2c10; box-shadow:0 3px 6px rgba(0,0,0,.18); border:2px solid rgba(0,0,0,.12); }
  .coin.penny{ width:44px; height:44px; background:linear-gradient(150deg,#e8a05a,#b87333); font-size:12px; }
  .coin.nickel{ width:52px; height:52px; background:linear-gradient(150deg,#e2e8ec,#aab4bd); font-size:12px; color:#334155; }
  .coin.dime{ width:40px; height:40px; background:linear-gradient(150deg,#e8edf1,#b6c0c9); font-size:11px; color:#334155; }
  .coin.quarter{ width:58px; height:58px; background:linear-gradient(150deg,#e2e8ec,#9aa6b0); font-size:13px; color:#334155; }
  .bill{ width:74px; height:40px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:16px; color:#14532d; background:linear-gradient(150deg,#c7f0d2,#86d6a0); border:2px solid #4ca86c; box-shadow:0 3px 6px rgba(0,0,0,.16); }

  .choices{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .choice{ background:#fff; border:3px solid #dbeee2; border-radius:14px; padding:15px; font-weight:800; font-size:18px; cursor:pointer; text-align:center; font-family:inherit; }
  .choice:hover{ border-color:var(--accent); }
  .choice.correct{ border-color:var(--correct); background:#dcfce7; }
  .choice.wrong{ border-color:var(--wrong); background:#fee2e2; }
  .choice[disabled]{ cursor:default; }

  .receipt{ background:#fffdf7; border:2px dashed #d9cfa8; border-radius:12px; padding:14px 18px; max-width:340px; margin:0 auto 16px; font-size:16px; }
  .receipt .ln{ display:flex; justify-content:space-between; padding:5px 0; }
  .receipt .ln.tot{ border-top:2px solid #d9cfa8; margin-top:6px; padding-top:8px; font-weight:900; }

  .drawer{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:12px 0; }
  .denom{ font-family:inherit; cursor:pointer; border:none; background:transparent; padding:0; }
  .tray{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; min-height:56px; background:#f7fbf8; border:2px solid #e3efe8; border-radius:14px; padding:12px; }
  .changeread{ text-align:center; font-weight:900; font-size:18px; margin:8px 0; }
  .changeread .due{ color:var(--muted); font-weight:700; font-size:14px; }

  .steps{ background:#f0fdf4; border:2px solid #bbf7d0; border-radius:14px; padding:14px 16px; margin:0 0 14px; font-size:14.5px; line-height:1.7; }
  .steps b{ color:#15803d; }
  .steps .step{ opacity:.35; transition:opacity .3s; }
  .steps .step.on{ opacity:1; }

  .btn{ font-family:inherit; font-size:15px; font-weight:800; border:none; border-radius:13px; padding:12px 20px; cursor:pointer; transition:transform .1s, background .15s; }
  .btn:active{ transform:scale(.96); }
  .btn-primary{ background:var(--accent); color:#fff; } .btn-primary:hover{ background:#15803d; }
  .btn-ghost{ background:#eef4f0; color:var(--muted); }
  .controls{ display:flex; gap:10px; justify-content:center; margin-top:16px; flex-wrap:wrap; }
  .feedback{ min-height:24px; margin-top:12px; font-weight:800; font-size:16px; text-align:center; }
  .feedback.good{ color:var(--correct); } .feedback.bad{ color:var(--wrong); }

  #confetti{ position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50; }
  .conf{ position:absolute; top:-20px; width:11px; height:14px; border-radius:2px; animation:fall linear forwards; }
  @keyframes fall{ to{ transform:translateY(105vh) rotate(720deg); } }

  .credit{ margin-top:24px; color:var(--muted); font-size:11px; text-align:center; }
</style>
</head>
<body>
  <div id="confetti"></div>
  <div class="nav">
    <a href="../index.html">🏠 Home</a>
    <button id="navMenu" class="on">💵 Games</button>
  </div>
  <h1>💵 Money Smarts</h1>
  <p class="sub" id="subtitle">Count it, make change, add it up, and beat the sale — pick a game!</p>

  <div class="scorebar" id="scorebar" style="display:none">
    <div class="chip">✅ <span id="correctCount">0</span> <small>correct</small></div>
    <div class="chip streak">🔥 <span id="streak">0</span> <small>streak</small></div>
  </div>

  <div class="menu" id="menu">
    <button class="gcard" data-game="count">
      <div class="icon">🪙</div><h3>Count It</h3>
      <p>Add up the coins and bills, then pick the right total.</p>
    </button>
    <button class="gcard" data-game="change">
      <div class="icon">🧾</div><h3>Make Change</h3>
      <p>Work the cash register — give back exactly the right change.</p>
    </button>
    <button class="gcard" data-game="addup">
      <div class="icon">➕</div><h3>Add It Up</h3>
      <p>Total up a receipt or a stack of bills to pay.</p>
    </button>
    <button class="gcard" data-game="percent">
      <div class="icon">🏷️</div><h3>Percent Off</h3>
      <p>Learn the quick trick for figuring out a sale price.</p>
    </button>
  </div>

  <div class="stage hidden" id="stage"></div>
  <div class="credit">Money Smarts</div>

<script src="app.js?v=1"></script>
</body>
</html>
