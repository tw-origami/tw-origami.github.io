<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Grease Monkey Garage</title>
<style>
  :root {
    --ink:#1f2937; --muted:#6b7280; --accent:#dc2626; --accent-soft:#fee2e2;
    --correct:#16a34a; --wrong:#b91c1c; --shadow:0 10px 30px rgba(127,29,29,.15);
  }
  * { box-sizing:border-box; }
  body {
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; color:var(--ink);
    background:linear-gradient(160deg,#fef2f2,#f8fafc); min-height:100vh;
    display:flex; flex-direction:column; align-items:center; padding:24px 16px 60px;
  }
  h1 { font-size:26px; margin:6px 0 2px; letter-spacing:-.5px; }
  .sub { color:var(--muted); margin:0 0 18px; font-size:15px; text-align:center; max-width:520px; line-height:1.5; }
  .nav{ display:flex; gap:8px; background:#fff; padding:5px; border-radius:12px; box-shadow:var(--shadow); margin-bottom:14px; }
  .nav a{ text-decoration:none; font-weight:800; font-size:14px; color:var(--muted); padding:8px 16px; border-radius:9px; }

  .controls { display:flex; flex-direction:column; align-items:center; gap:12px; margin-bottom:16px; }
  .seg { display:flex; background:#fff; border-radius:14px; padding:5px; box-shadow:var(--shadow); gap:4px; flex-wrap:wrap; justify-content:center; }
  .seg button { border:none; background:transparent; font-family:inherit; font-weight:800; font-size:14.5px; padding:9px 16px; border-radius:10px; cursor:pointer; color:var(--muted); }
  .seg button.on { background:var(--accent); color:#fff; }
  .seg.cats button { font-size:13px; padding:7px 12px; }

  .scorebar { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; justify-content:center; }
  .chip { background:#fff; border-radius:999px; padding:8px 16px; font-weight:700; font-size:14px; box-shadow:var(--shadow); display:flex; align-items:center; gap:6px; }
  .chip small { color:var(--muted); font-weight:600; }
  .chip.streak { color:#ea580c; }

  .stage { width:100%; max-width:560px; }
  .card { width:100%; background:#fff; border-radius:24px; box-shadow:var(--shadow); padding:26px 22px; display:flex; flex-direction:column; align-items:center; }
  .prompt { color:var(--muted); font-size:14px; margin:0 0 16px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; text-align:center; }

  .subject { text-align:center; margin-bottom:20px; width:100%; }
  .part-icon { width:150px; height:150px; margin:0 auto; }
  .subj-name { font-size:22px; font-weight:800; margin-top:6px; }
  .subj-q { font-size:20px; font-weight:800; line-height:1.4; max-width:460px; margin:0 auto; }

  /* Repair ticket (Fix It) */
  .ticket { width:100%; max-width:440px; margin:0 auto; background:#fffbeb; border:2px dashed #f59e0b; border-radius:14px; padding:16px 18px; text-align:left; }
  .ticket .thead { font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.6px; color:#b45309; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
  .ticket .sym { font-size:17px; font-weight:700; line-height:1.5; color:var(--ink); }
  .ticket .ask { margin-top:12px; font-weight:800; color:var(--accent); font-size:14.5px; }

  .choices { display:flex; flex-direction:column; gap:11px; width:100%; }
  .choices.grid { display:grid; grid-template-columns:1fr 1fr; }
  .choice { background:#fff; border:3px solid #e5e7eb; border-radius:16px; font-size:16.5px; font-weight:700; padding:13px 16px; color:var(--ink); cursor:pointer; text-align:left; display:flex; align-items:center; gap:10px; font-family:inherit; line-height:1.3; }
  .choice .cico { width:40px; height:40px; flex:none; }
  .choice.iconchoice { flex-direction:column; text-align:center; gap:6px; align-items:center; font-size:15px; }
  .choice.iconchoice .cico { width:52px; height:52px; }
  .choice:hover:not(:disabled) { border-color:var(--accent); background:var(--accent-soft); }
  .choice.correct { border-color:var(--correct); background:#dcfce7; color:var(--correct); }
  .choice.wrong { border-color:var(--wrong); background:#fee2e2; color:var(--wrong); }
  .choice:disabled { cursor:default; }

  .feedback { min-height:26px; margin-top:16px; font-weight:700; font-size:17px; text-align:center; }
  .feedback.good { color:var(--correct); }
  .feedback.bad { color:var(--wrong); }

  .reveal { color:var(--ink); font-size:14.5px; line-height:1.6; text-align:left; width:100%; margin:12px auto 4px; padding:14px 16px; background:var(--accent-soft); border-left:3px solid var(--accent); border-radius:8px; }
  .reveal.hidden { display:none; }
  .reveal .rev-title { display:flex; align-items:center; gap:10px; font-size:18px; font-weight:800; margin-bottom:6px; color:#991b1b; }
  .reveal .rev-title .ricon { width:38px; height:38px; flex:none; }
  .reveal .rev-where { margin-top:8px; color:#7f1d1d; font-weight:700; font-size:13.5px; }
  .reveal .rev-fact { margin-top:9px; background:#fffbeb; border-radius:8px; padding:8px 12px; font-size:13.5px; color:#92400e; line-height:1.5; }
  .reveal .rev-fact b { color:#b45309; }

  button.act { font-family:inherit; font-size:16px; font-weight:700; border:none; border-radius:14px; padding:13px 24px; cursor:pointer; }
  button.act:disabled { opacity:.55; cursor:default; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-row { display:flex; gap:12px; margin-top:18px; flex-wrap:wrap; justify-content:center; }

  /* Dashboard Detective — a lit warning symbol */
  .dashlight { width:120px; height:120px; margin:0 auto 4px; background:#111827; border-radius:18px; padding:14px; box-shadow:inset 0 0 24px rgba(245,158,11,.35); }
  .dash-urgency { display:inline-block; font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.4px; padding:4px 12px; border-radius:999px; margin-top:6px; }
  .dash-urgency.now { background:#fee2e2; color:#b91c1c; }
  .dash-urgency.soon { background:#fef3c7; color:#b45309; }
  .reveal .rev-action { margin-top:8px; font-weight:700; }

  /* Under the Hood diagram */
  .diagram { width:100%; max-width:520px; margin:0 auto 6px; }
  .hint-line { text-align:center; color:var(--muted); font-size:13.5px; margin-top:6px; font-weight:700; }
  svg .hot { cursor:pointer; }
  svg .hot .hotdot { transition:transform .12s, fill .12s; }
  svg .hot:hover .hotdot { transform:scale(1.25); transform-origin:center; }
  svg .hot.correct .hotdot { fill:#16a34a; }
  svg .hot.wrong .hotdot { fill:#b91c1c; }
  svg .hot.reveal-correct .hotdot { fill:#16a34a; stroke:#166534; }

  #confetti { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50; }
  .conf { position:absolute; top:-20px; width:11px; height:14px; border-radius:2px; opacity:.95; animation:fall linear forwards; }
  @keyframes fall { to { transform:translateY(105vh) rotate(720deg); opacity:1; } }
  #streakBanner { position:fixed; left:50%; top:22%; transform:translate(-50%,-50%) scale(.6); background:linear-gradient(135deg,#ef4444,#dc2626); color:#fff; font-weight:900; font-size:28px; padding:20px 38px; border-radius:22px; box-shadow:0 18px 50px rgba(220,38,38,.45); z-index:60; opacity:0; pointer-events:none; text-align:center; white-space:nowrap; }
  #streakBanner.show { animation: banner 1.9s cubic-bezier(.2,.9,.3,1.3) forwards; }
  #streakBanner small { display:block; font-size:15px; font-weight:700; opacity:.9; margin-top:4px; }
  @keyframes banner { 0%{opacity:0; transform:translate(-50%,-50%) scale(.6)} 15%{opacity:1; transform:translate(-50%,-50%) scale(1.08)} 28%{transform:translate(-50%,-50%) scale(1)} 80%{opacity:1; transform:translate(-50%,-50%) scale(1)} 100%{opacity:0; transform:translate(-50%,-60%) scale(.95)} }
</style>
</head>
<body>
  <div class="nav"><a href="../index.html">🏠 Home</a></div>
  <h1>🔧 Grease Monkey Garage</h1>
  <p class="sub">Learn what’s inside a car and how it all works — name the parts, find them under the hood, see how engines run, and fix what’s broken like a real mechanic.</p>

  <div class="controls">
    <div class="seg" id="modeSeg">
      <button data-mode="parts" class="on">🔩 Name That Part</button>
      <button data-mode="hood">🚗 Under the Hood</button>
      <button data-mode="work">⚙️ How It Works</button>
      <button data-mode="fix">🔧 Fix It Shop</button>
      <button data-mode="dash">⚠️ Dashboard</button>
    </div>
    <div class="seg cats" id="catSeg" style="display:none"></div>
  </div>

  <div id="confetti"></div>
  <div id="streakBanner"></div>

  <div class="scorebar">
    <div class="chip">✅ <span id="correctCount">0</span> <small>correct</small></div>
    <div class="chip">🎯 <span id="totalCount">0</span> <small>tried</small></div>
    <div class="chip streak">🔥 <span id="streak">0</span> <small>streak</small></div>
  </div>

  <div class="stage">
    <div class="card">
      <p class="prompt" id="prompt"></p>
      <div class="subject" id="subject"></div>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback"></div>
      <div class="reveal hidden" id="reveal"></div>
      <div class="btn-row" id="nextRow" style="display:none"><button class="act btn-primary" id="nextBtn">Next ➡️</button></div>
    </div>
  </div>

<script src="carart.js"></script>
<script src="data.js"></script>
<script>
(function(){
  const $ = id => document.getElementById(id);
  const pick = arr => arr[Math.floor(Math.random()*arr.length)];
  const shuffle = arr => arr.slice().sort(()=>Math.random()-0.5);
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const C = window.CARS, ART = window.CARART;
  const PART = {}; C.PARTS.forEach(p => PART[p.key] = p);

  let mode = 'parts', cat = 'all';
  let correct = 0, total = 0, streak = 0;
  let answered = false, advanceReady = true, advanceTimer = null, countdownTimer = null;
  let lastKey = null, curReveal = '';

  function clearTimers(){ if(advanceTimer){clearTimeout(advanceTimer);advanceTimer=null;} if(countdownTimer){clearInterval(countdownTimer);countdownTimer=null;} }
  function updateScore(){ $('correctCount').textContent=correct; $('totalCount').textContent=total; $('streak').textContent=streak; }
  function resetProgress(){ correct=0; total=0; streak=0; lastKey=null; updateScore(); }

  function renderCats(){
    const seg = $('catSeg'); seg.style.display = mode==='parts' ? 'flex' : 'none';
    if (mode!=='parts'){ seg.innerHTML=''; return; }
    seg.innerHTML='';
    C.PART_CATS.forEach(([k,l]) => { const b=document.createElement('button'); b.dataset.cat=k; b.textContent=l; if(k===cat)b.classList.add('on'); seg.appendChild(b); });
  }

  // ---------- shared read-lock + reveal ----------
  function startReadLock(){
    advanceReady=false; let secs=3; const nb=$('nextBtn');
    nb.disabled=true; nb.textContent=`Read it… (${secs})`; $('nextRow').style.display='flex';
    countdownTimer=setInterval(()=>{ secs--; if(secs>0)nb.textContent=`Read it… (${secs})`; else{clearInterval(countdownTimer);countdownTimer=null;} },1000);
    advanceTimer=setTimeout(()=>{ advanceReady=true; advanceTimer=null; nb.disabled=false; nb.textContent='Next ➡️'; nb.focus(); },3000);
  }
  function tryAdvance(){ if(answered && advanceReady) newRound(); }
  function celebrate(n){
    const msgs={5:'🌟 5 in a row!',10:'🔥 10 streak!',15:'⚡ 15 in a row!',20:'🏆 Master mechanic!'};
    const b=$('streakBanner'); b.innerHTML=`${msgs[n]||'🌟 '+n+' in a row!'}<small>Keep wrenching!</small>`;
    b.classList.remove('show'); void b.offsetWidth; b.classList.add('show');
    const colors=['#dc2626','#f59e0b','#16a34a','#0ea5e9','#6b7280','#1f2937']; const box=$('confetti');
    for(let i=0;i<80;i++){ const c=document.createElement('div'); c.className='conf'; c.style.left=Math.random()*100+'vw'; c.style.background=colors[i%colors.length]; c.style.animationDuration=(1.6+Math.random()*1.4)+'s'; c.style.animationDelay=(Math.random()*0.4)+'s'; box.appendChild(c); setTimeout(()=>c.remove(),3400); }
  }

  function finishAnswer(isCorrect){
    answered=true; total++;
    if(isCorrect){ correct++; streak++; } else streak=0;
    updateScore();
    const fb=$('feedback');
    if(isCorrect){ fb.textContent=pick(['🎉 Correct!','⭐ Nice!','✅ Got it!','🔧 Good wrenching!']); fb.className='feedback good'; }
    else { fb.textContent='Not quite — here’s the answer:'; fb.className='feedback bad'; }
    const rev=$('reveal'); rev.innerHTML=curReveal; rev.className='reveal';
    if(isCorrect && streak>0 && streak%5===0) celebrate(streak);
    startReadLock();
  }

  // ---------- build a multiple-choice round (parts / work / fix) ----------
  function buildChoices(items, correctVal, valOf, htmlOf, gridIcons){
    const box=$('choices'); box.className = gridIcons ? 'choices grid' : 'choices'; box.innerHTML='';
    items.forEach(it=>{
      const btn=document.createElement('button');
      btn.className='choice' + (gridIcons?' iconchoice':'');
      btn.innerHTML=htmlOf(it);
      if(valOf(it)===correctVal) btn.dataset.correct='1';
      btn.onclick=()=>{ if(answered)return; [...box.children].forEach(c=>{c.disabled=true; if(c.dataset.correct==='1')c.classList.add('correct');}); if(!btn.dataset.correct)btn.classList.add('wrong'); finishAnswer(!!btn.dataset.correct); };
      box.appendChild(btn);
    });
  }

  function roundParts(){
    const pool = cat==='all' ? C.PARTS : C.PARTS.filter(p=>p.cat===cat);
    let p,tries=0; do{ p=pick(pool); tries++; }while(pool.length>1 && p.key===lastKey && tries<20); lastKey=p.key;
    const distract = shuffle(C.PARTS.filter(x=>x.key!==p.key)).slice(0,3);
    const opts = shuffle([p, ...distract]);
    $('prompt').textContent='What part is this?';
    $('subject').innerHTML=`<div class="part-icon">${ART.part(p.key)}</div>`;
    curReveal = `<div class="rev-title"><span class="ricon">${ART.part(p.key)}</span>${esc(p.name)}</div><div>${esc(p.job)}</div><div class="rev-where">📍 ${esc(p.where)}</div>` + (p.fact?`<div class="rev-fact"><b>💡 Did you know?</b> ${esc(p.fact)}</div>`:'');
    buildChoices(opts, p.key, x=>x.key, x=>esc(x.name), false);
  }

  function roundWork(){
    let q,tries=0; do{ q=pick(C.HOWITWORKS); tries++; }while(C.HOWITWORKS.length>1 && q.q===lastKey && tries<20); lastKey=q.q;
    const correctText=q.choices[q.answer]; const opts=shuffle(q.choices);
    $('prompt').textContent='How Cars Work';
    $('subject').innerHTML=`<div class="subj-q">${esc(q.q)}</div>`;
    curReveal = `<div>${esc(q.explain)}</div>`;
    buildChoices(opts, correctText, x=>x, x=>esc(x), false);
  }

  function roundFix(){
    let f,tries=0; do{ f=pick(C.FIXES); tries++; }while(C.FIXES.length>1 && f.symptom===lastKey && tries<20); lastKey=f.symptom;
    const opts=shuffle(f.choices.slice());
    $('prompt').textContent='Fix It Shop';
    $('subject').innerHTML=`<div class="ticket"><div class="thead">🔧 Repair Ticket</div><div class="sym">“${esc(f.symptom)}”</div><div class="ask">Which part needs to be fixed?</div></div>`;
    const ans = PART[f.answer];
    curReveal = `<div class="rev-title"><span class="ricon">${ART.part(f.answer)}</span>${esc(ans.name)}</div><div>${esc(f.explain)}</div>`;
    buildChoices(opts, f.answer, k=>k, k=>`<span class="cico">${ART.part(k)}</span>${esc(PART[k].name)}`, true);
  }

  // ---------- Under the Hood (tap the part) ----------
  let hoodTarget = null;
  function roundHood(){
    let t,tries=0; do{ t=pick(C.DIAGRAM_PARTS); tries++; }while(C.DIAGRAM_PARTS.length>1 && t.key===lastKey && tries<20); lastKey=t.key; hoodTarget=t;
    $('prompt').textContent='Under the Hood';
    $('subject').innerHTML=`<div class="diagram">${ART.carDiagram()}</div><div class="subj-q" style="font-size:19px;margin-top:8px">Tap the <span style="color:var(--accent)">${esc(t.name)}</span>!</div><div class="hint-line">💡 ${esc(t.hint)}</div>`;
    $('choices').innerHTML=''; $('choices').className='choices';
    curReveal = `<div class="rev-title"><span class="ricon">${ART.hasPart(t.key)?ART.part(t.key):''}</span>${esc(t.name)}</div><div>${esc(t.learn)}</div>`;
    $('subject').querySelectorAll('.hot').forEach(h=>{
      h.addEventListener('click', ()=>{
        if(answered) return;
        const right = h.dataset.part===hoodTarget.key;
        $('subject').querySelectorAll('.hot').forEach(x=>{ x.style.pointerEvents='none'; if(x.dataset.part===hoodTarget.key) x.classList.add('reveal-correct'); });
        h.classList.add(right?'correct':'wrong');
        finishAnswer(right);
      });
    });
  }

  function roundDash(){
    let l,tries=0; do{ l=pick(C.LIGHTS); tries++; }while(C.LIGHTS.length>1 && l.key===lastKey && tries<20); lastKey=l.key;
    const correctText=l.choices[l.answer]; const opts=shuffle(l.choices.slice());
    $('prompt').textContent='Dashboard Detective';
    $('subject').innerHTML=`<div class="dashlight">${ART.light(l.key)}</div><div class="subj-name">${esc(l.name)} light</div><div class="subj-q" style="font-size:17px;margin-top:8px">This light just came on. What does it mean?</div>`;
    curReveal = `<div class="rev-title">${esc(l.name)}</div><div>${esc(l.meaning)}</div><div class="rev-action">🛠️ What to do: ${esc(l.action)}</div>` + (l.did?`<div class="rev-fact"><b>💡 Did you know?</b> ${esc(l.did)}</div>`:'') + `<div style="margin-top:8px"><span class="dash-urgency ${l.urgency}">${l.urgency==='now'?'⛔ Deal with it now':'⏳ Check it soon'}</span></div>`;
    buildChoices(opts, correctText, x=>x, x=>esc(x), false);
  }

  function newRound(){
    clearTimers(); advanceReady=true; answered=false;
    $('feedback').textContent=''; $('feedback').className='feedback';
    $('reveal').className='reveal hidden'; $('reveal').innerHTML='';
    $('nextRow').style.display='none';
    if(mode==='parts') roundParts();
    else if(mode==='work') roundWork();
    else if(mode==='fix') roundFix();
    else if(mode==='dash') roundDash();
    else roundHood();
  }

  $('modeSeg').addEventListener('click', e=>{ const b=e.target.closest('button'); if(!b)return; mode=b.dataset.mode; cat='all'; [...$('modeSeg').children].forEach(x=>x.classList.toggle('on',x===b)); renderCats(); resetProgress(); newRound(); });
  $('catSeg').addEventListener('click', e=>{ const b=e.target.closest('button'); if(!b)return; cat=b.dataset.cat; [...$('catSeg').children].forEach(x=>x.classList.toggle('on',x===b)); resetProgress(); newRound(); });
  $('nextBtn').onclick = tryAdvance;
  document.addEventListener('keydown', e=>{ if(e.key!=='Enter')return; e.preventDefault(); if(answered) tryAdvance(); });

  renderCats(); newRound();
})();
</script>
</body>
</html>
